<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Veltrix 3D CAD Studio</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef2f5;
      --panel: #ffffff;
      --panel-2: #f6f8fa;
      --ink: #18212b;
      --muted: #647280;
      --line: #d5dee6;
      --line-strong: #b8c6d1;
      --red: #d71920;
      --red-soft: #ffe7e8;
      --teal: #087d83;
      --teal-soft: #dff3f4;
      --green: #2f7d46;
      --amber: #b66b00;
      --blue: #285f9f;
      --shadow: 0 14px 32px rgba(24, 33, 43, 0.08);
      --radius: 8px;
      --top-h: 106px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(8, 125, 131, 0.06) 1px, transparent 1px),
        linear-gradient(0deg, rgba(215, 25, 32, 0.045) 1px, transparent 1px),
        var(--bg);
      background-size: 42px 42px;
      color: var(--ink);
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    input,
    select,
    textarea {
      min-width: 0;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      outline: none;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(8, 125, 131, 0.13);
    }

    .app {
      display: grid;
      grid-template-rows: var(--top-h) 1fr 28px;
      width: 100vw;
      height: 100vh;
    }

    .top {
      position: relative;
      z-index: 5;
      display: grid;
      grid-template-rows: 44px 62px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 8px 22px rgba(24, 33, 43, 0.06);
      backdrop-filter: blur(14px);
    }

    .menu-row {
      display: grid;
      grid-template-columns: 236px 1fr auto;
      gap: 14px;
      align-items: center;
      min-width: 0;
      padding: 7px 14px;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-mark {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 7px;
      background: var(--red);
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      box-shadow: 0 8px 20px rgba(215, 25, 32, 0.2);
    }

    .brand-title {
      min-width: 0;
      font-size: 15px;
      font-weight: 800;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .menu-buttons,
    .quick-buttons,
    .command-tabs,
    .command-strip {
      display: flex;
      align-items: center;
      min-width: 0;
    }

    .menu-buttons {
      gap: 4px;
    }

    .menu-button {
      min-height: 28px;
      padding: 5px 9px;
      border-radius: 6px;
      background: transparent;
      color: #344150;
      font-size: 12px;
    }

    .menu-button:hover {
      background: var(--panel-2);
    }

    .quick-buttons {
      gap: 6px;
      justify-content: end;
    }

    .tool-btn,
    .tab-btn,
    .icon-btn {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: #283440;
      transition: background 140ms ease, border-color 140ms ease, transform 140ms ease;
    }

    .tool-btn:hover,
    .tab-btn:hover,
    .icon-btn:hover {
      transform: translateY(-1px);
      border-color: var(--line-strong);
      background: #f9fbfc;
    }

    .icon-btn {
      width: 34px;
      height: 30px;
      display: grid;
      place-items: center;
      padding: 0;
      font-size: 14px;
      font-weight: 800;
    }

    .ribbon-row {
      display: grid;
      grid-template-columns: 236px 1fr;
      gap: 14px;
      align-items: stretch;
      min-width: 0;
      padding: 8px 14px;
    }

    .command-tabs {
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .tab-btn {
      flex: 0 0 auto;
      min-height: 42px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .tab-btn.active {
      border-color: var(--red);
      background: var(--red-soft);
      color: var(--red);
    }

    .command-strip {
      gap: 7px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .tool-btn {
      flex: 0 0 auto;
      min-width: 58px;
      min-height: 42px;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 2px;
      padding: 6px 9px;
      font-size: 11px;
      line-height: 1.1;
    }

    .tool-btn.active {
      border-color: var(--teal);
      background: var(--teal-soft);
      color: #075e63;
      font-weight: 800;
    }

    .tool-icon {
      width: 18px;
      height: 18px;
      display: grid;
      place-items: center;
      border-radius: 5px;
      background: #eef2f5;
      color: #354554;
      font-size: 11px;
      font-weight: 800;
    }

    .main {
      display: grid;
      grid-template-columns: 270px minmax(0, 1fr) 308px;
      gap: 10px;
      min-height: 0;
      padding: 10px;
    }

    .panel,
    .viewport-shell {
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel {
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 42px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
    }

    .panel-title {
      min-width: 0;
      font-size: 12px;
      font-weight: 800;
      color: #394757;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pane-tabs {
      display: flex;
      gap: 5px;
    }

    .pane-tab {
      min-width: 34px;
      min-height: 26px;
      padding: 4px 6px;
      border-radius: 5px;
      background: #edf2f5;
      color: #41515f;
      font-size: 11px;
      font-weight: 800;
    }

    .pane-tab.active {
      background: var(--red-soft);
      color: var(--red);
    }

    .tree-body,
    .props-body {
      min-height: 0;
      overflow: auto;
      padding: 10px;
    }

    .tree-group + .tree-group {
      margin-top: 12px;
    }

    .tree-group-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin: 0 0 6px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .tree-item {
      display: grid;
      grid-template-columns: 18px 1fr auto;
      gap: 8px;
      align-items: center;
      min-height: 30px;
      padding: 5px 6px;
      border-radius: 6px;
      color: #2e3a45;
      font-size: 12px;
    }

    .tree-item:hover,
    .tree-item.selected {
      background: #f0f5f7;
    }

    .tree-dot {
      width: 13px;
      height: 13px;
      border: 1px solid #aebfca;
      border-radius: 4px;
      background: #dbe5eb;
    }

    .tree-dot.red {
      border-color: #ef9fa2;
      background: var(--red-soft);
    }

    .tree-dot.teal {
      border-color: #8bcdd0;
      background: var(--teal-soft);
    }

    .tree-dot.green {
      border-color: #8fbf9d;
      background: #e1f2e5;
    }

    .tree-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tree-count {
      color: var(--muted);
      font-size: 11px;
    }

    .viewport-shell {
      display: grid;
      grid-template-rows: 42px minmax(0, 1fr) 30px;
    }

    .viewport-top {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
    }

    .view-dots {
      display: flex;
      gap: 6px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--red);
    }

    .dot:nth-child(2) {
      background: var(--amber);
    }

    .dot:nth-child(3) {
      background: var(--green);
    }

    .view-title {
      min-width: 0;
      color: #425466;
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .heads-up {
      display: flex;
      gap: 6px;
    }

    .hud {
      min-width: 32px;
      height: 25px;
      display: grid;
      place-items: center;
      border-radius: 5px;
      background: #edf2f5;
      color: #2e3d4c;
      font-size: 11px;
      font-weight: 800;
    }

    .canvas-wrap {
      position: relative;
      min-height: 0;
      background: #fff;
    }

    .three-viewport {
      position: absolute;
      inset: 0;
      z-index: 0;
      display: none;
      overflow: hidden;
      background: #f8fbfd;
    }

    .three-viewport canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .canvas-wrap.three-active .three-viewport {
      display: block;
    }

    #cadCanvas {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: block;
      background: transparent;
    }

    .view-overlay {
      position: absolute;
      left: 14px;
      top: 14px;
      z-index: 2;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      max-width: calc(100% - 28px);
      pointer-events: none;
    }

    .badge {
      min-height: 26px;
      display: inline-flex;
      align-items: center;
      padding: 5px 8px;
      border: 1px solid rgba(53, 69, 84, 0.16);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.88);
      color: #30404f;
      font-size: 11px;
      font-weight: 700;
      box-shadow: 0 6px 18px rgba(24, 33, 43, 0.08);
    }

    .viewport-status {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 12px;
      align-items: center;
      padding: 6px 10px;
      border-top: 1px solid var(--line);
      background: #fbfcfd;
      color: #526272;
      font-size: 12px;
    }

    .props-body {
      display: grid;
      align-content: start;
      gap: 12px;
    }

    .property-section {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      overflow: hidden;
    }

    .property-section h3 {
      margin: 0;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      background: #f7fafb;
      color: #354554;
      font-size: 12px;
      text-transform: uppercase;
    }

    .property-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 8px;
    }

    .field {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
    }

    .field input,
    .field select {
      width: 100%;
      height: 28px;
      padding: 5px 7px;
      font-size: 12px;
    }

    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 10px;
    }

    .action-btn {
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: #30404f;
      font-size: 12px;
      font-weight: 700;
    }

    .action-btn.primary {
      border-color: var(--red);
      background: var(--red);
      color: #fff;
    }

    .action-btn:hover {
      background: #f7fafb;
    }

    .action-btn.primary:hover {
      background: #bd141a;
    }

    .list-box {
      display: grid;
      gap: 6px;
      padding: 10px;
      max-height: 190px;
      overflow: auto;
    }

    .mini-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      min-height: 28px;
      padding: 6px 7px;
      border-radius: 6px;
      background: #f8fafb;
      color: #394858;
      font-size: 12px;
    }

    .mini-row strong {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .pill {
      padding: 3px 6px;
      border-radius: 999px;
      background: #e9eef2;
      color: #526272;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .bottom {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 14px;
      align-items: center;
      padding: 5px 12px;
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.96);
      color: #536374;
      font-size: 12px;
    }

    .toast {
      position: fixed;
      right: 16px;
      bottom: 42px;
      z-index: 10;
      min-width: 220px;
      max-width: min(420px, calc(100vw - 32px));
      padding: 10px 12px;
      border: 1px solid var(--line-strong);
      border-left: 4px solid var(--teal);
      border-radius: 7px;
      background: #fff;
      color: #263542;
      box-shadow: 0 16px 42px rgba(24, 33, 43, 0.16);
      font-size: 13px;
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 1180px) {
      :root {
        --top-h: 148px;
      }

      body {
        overflow: auto;
      }

      .app {
        min-height: 100vh;
        height: auto;
      }

      .top {
        grid-template-rows: auto auto;
        position: sticky;
        top: 0;
      }

      .menu-row,
      .ribbon-row {
        grid-template-columns: 1fr;
      }

      .quick-buttons {
        justify-content: start;
        overflow-x: auto;
      }

      .main {
        grid-template-columns: 1fr;
      }

      .panel,
      .viewport-shell {
        min-height: 420px;
      }

      .tree-body,
      .props-body {
        max-height: 360px;
      }
    }

    @media (max-width: 720px) {
      .main {
        padding: 8px;
      }

      .viewport-shell {
        min-height: 520px;
      }

      .viewport-status {
        grid-template-columns: 1fr 1fr;
      }

      .property-grid,
      .action-grid {
        grid-template-columns: 1fr;
      }
    }

    @media print {
      body {
        overflow: visible;
        background: #fff;
      }

      .app {
        display: block;
        height: auto;
      }

      .top,
      .left-panel,
      .right-panel,
      .bottom,
      .toast {
        display: none;
      }

      .main {
        display: block;
        padding: 0;
      }

      .viewport-shell {
        height: 95vh;
        box-shadow: none;
      }
    }

    /* ── Extrude PropertyManager Modal ── */
    .extrude-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(24,33,43,0.28);
      backdrop-filter: blur(2px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease;
    }
    .extrude-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .extrude-dialog {
      width: 330px;
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 24px 56px rgba(24,33,43,0.18);
      border: 1px solid var(--line);
      overflow: hidden;
      transform: translateY(12px) scale(0.98);
      transition: transform 180ms ease;
    }
    .extrude-overlay.open .extrude-dialog {
      transform: translateY(0) scale(1);
    }
    .extrude-dialog-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 16px 11px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
    }
    .extrude-dialog-icon {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      background: var(--red);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 13px;
      font-weight: 900;
      flex-shrink: 0;
      box-shadow: 0 6px 14px rgba(215,25,32,0.22);
    }
    .extrude-dialog-title {
      font-size: 13px;
      font-weight: 800;
      color: var(--ink);
      line-height: 1.1;
    }
    .extrude-dialog-subtitle {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
    }
    .extrude-dialog-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .extrude-field-row {
      display: grid;
      grid-template-columns: 120px 1fr;
      align-items: center;
      gap: 10px;
    }
    .extrude-field-row label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
    }
    .extrude-field-row input[type="number"],
    .extrude-field-row select {
      width: 100%;
      height: 32px;
      padding: 0 10px;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      outline: none;
    }
    .extrude-field-row input[type="number"]:focus,
    .extrude-field-row select:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(215,25,32,0.10);
    }
    .extrude-slider-row {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .extrude-slider-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--muted);
    }
    .extrude-slider-row input[type="range"] {
      width: 100%;
      height: 4px;
      accent-color: var(--red);
      cursor: pointer;
    }
    .extrude-preview-badge {
      background: var(--red-soft);
      border: 1px solid rgba(215,25,32,0.18);
      border-radius: 6px;
      padding: 7px 12px;
      font-size: 12px;
      color: var(--red);
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.01em;
    }
    .extrude-separator {
      height: 1px;
      background: var(--line);
      margin: 0 -16px;
    }
    .extrude-direction-row {
      display: flex;
      gap: 6px;
    }
    .extrude-dir-btn {
      flex: 1;
      height: 34px;
      border-radius: 6px;
      border: 1px solid var(--line-strong);
      background: #fff;
      color: var(--ink);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all 120ms;
    }
    .extrude-dir-btn.active {
      border-color: var(--red);
      background: var(--red-soft);
      color: var(--red);
    }
    .extrude-dir-btn:hover:not(.active) {
      background: var(--panel-2);
    }
    .extrude-dialog-footer {
      display: flex;
      gap: 8px;
      padding: 12px 16px 14px;
      border-top: 1px solid var(--line);
      background: #fbfcfd;
    }
    .extrude-footer-btn {
      flex: 1;
      height: 36px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid var(--line-strong);
      background: #fff;
      color: var(--ink);
      transition: all 120ms;
    }
    .extrude-footer-btn:hover {
      background: var(--panel-2);
    }
    .extrude-footer-btn.confirm {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
      box-shadow: 0 4px 12px rgba(215,25,32,0.22);
    }
    .extrude-footer-btn.confirm:hover {
      background: #b8141a;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="top">
      <div class="menu-row">
        <div class="brand">
          <div class="brand-mark">V3D</div>
          <div class="brand-title" id="projectName">Part Studio 1</div>
        </div>
        <nav class="menu-buttons" aria-label="Menu">
          <button class="menu-button" data-menu="file">File</button>
          <button class="menu-button" data-menu="edit">Edit</button>
          <button class="menu-button" data-menu="view">View</button>
          <button class="menu-button" data-menu="insert">Insert</button>
          <button class="menu-button" data-menu="tools">Tools</button>
          <button class="menu-button" data-menu="window">Window</button>
          <button class="menu-button" data-menu="help">Help</button>

        tool: "select",
        view: "front",
        unit: "mm",
        grid: true,
        snap: true,

        appearance: "shaded",
        renderMode: "edges",
        sectionView: false
      };
    }

    function id(prefix) {
      const value = `${prefix}${state.nextId}`;
      state.nextId += 1;
      return value;
    }

    function snapshot() {
      const copy = cleanState();
      state.history.push(JSON.stringify(copy));
      if (state.history.length > 80) state.history.shift();
      state.future = [];
      state.dirty = true;
      savedState.textContent = "Unsaved changes";
    }

    function cleanState() {
      const { history, future, ...rest } = state;
      return JSON.parse(JSON.stringify(rest));
    }

    function restore(serialized) {
      const restored = typeof serialized === "string" ? JSON.parse(serialized) : serialized;
      const history = state.history;
      const future = state.future;
      state = { ...makeInitialState(), ...restored, history, future };
      transient = { ...transient, drawing: false, start: null, preview: null, dragId: null, dragLast: null, arcStep: 0, arcData: null, splinePoints: [] };
      renderAll();
    }

    function undo() {
      if (!state.history.length) return notify("Nothing to undo");
      state.future.push(JSON.stringify(cleanState()));
      restore(state.history.pop());
      state.dirty = true;
      notify("Undo");
    }

    function redo() {
      if (!state.future.length) return notify("Nothing to redo");
      state.history.push(JSON.stringify(cleanState()));
      restore(state.future.pop());
      state.dirty = true;
      notify("Redo");
    }

    function setTab(tab) {
      state.activeTab = tab;
      state.workspace = tabWorkspace(tab);
      if (tab !== "Sketch" && state.tool !== "assemblyMove") state.tool = "select";
      if (tab === "Assembly") state.tool = "assemblyMove";
      viewTitle.textContent = `${tab} - ${viewLabel()}`;
      renderAll();
    }

    function tabWorkspace(tab) {
      if (tab === "Sketch") return "sketch";
      if (["Features", "Surfaces", "Sheet Metal", "Weldments", "Mold Tools", "Add-Ins"].includes(tab)) return "model";
      if (tab === "Assembly") return "assembly";
      if (tab === "Drawing") return "drawing";
      if (tab === "Evaluate") return "evaluate";
      return state.workspace;
    }

    function setTool(tool) {
      state.tool = tool;
      transient.start = null;
      transient.preview = null;
      transient.arcStep = 0;
      transient.arcData = null;
      transient.splinePoints = [];
      statusMessage.textContent = `${toolName(tool)} active`;
      renderCommands();
      renderProps();
      render();
    }

    function toolName(tool) {
      return tool.replace(/([A-Z])/g, " $1").replace(/^./, c => c.toUpperCase());

      extrudeDepthInput.value = Number(state.depth || 40);
      updateExtrudePreview();
      extrudeOverlay.classList.add("open");
      extrudeOverlay.setAttribute("aria-hidden", "false");
      extrudeDepthInput.focus();
      extrudeDepthInput.select();
    }

    function closeExtrudeDialog() {
      extrudeOverlay.classList.remove("open");
      extrudeOverlay.setAttribute("aria-hidden", "true");
    }

    function updateExtrudePreview() {
      const value = Number(extrudeDepthInput.value);
      const safeValue = Number.isFinite(value) && value > 0 ? value : Number(state.depth || 40);
      extrudePreviewBadge.textContent = `Preview: ${safeValue} ${state.unit}`;
    }

    function confirmExtrude() {
      const value = Number(extrudeDepthInput.value);
      if (!Number.isFinite(value) || value <= 0) {
        notify("Enter a valid extrusion size");
        return;
      }
      state.depth = value;
      closeExtrudeDialog();
      addFeature("extrude", "Extruded Boss/Base");
    }

    function renderTabs() {
      commandTabs.innerHTML = tabs.map(tab => `
        <button class="tab-btn ${tab === state.activeTab ? "active" : ""}" data-tab="${tab}">${tab}</button>
      `).join("");
    }

    function renderCommands() {
      const list = commands[state.activeTab] || [];
      commandStrip.innerHTML = list.map(item => {
        const active = item.tool && item.tool === state.tool;
        return `
          <button class="tool-btn ${active ? "active" : ""}" title="${item.label}" data-tool="${item.tool || ""}" data-action="${item.action || ""}">
            <span class="tool-icon">${item.icon}</span>
            <span>${item.label}</span>
          </button>
        `;
      }).join("");
    }

    function renderTree() {
      const entityRows = state.entities.map(entity => treeRow(entity.id, entity.name || entity.type, entity.type, state.selected.includes(entity.id), "teal"));
      const dimRows = state.dimensions.map(dim => treeRow(dim.id, dim.label, "Dimension", false, "green"));
      const featureRows = state.features.map(feature => treeRow(feature.id, feature.name, feature.type, false, feature.type === "cut" ? "red" : "green"));
      const componentRows = state.components.map(component => treeRow(component.id, component.name, "Component", state.selectedComponents.includes(component.id), "teal"));
      const mateRows = state.mates.map(mate => treeRow(mate.id, mate.type, "Mate", false, "green"));
      const reportRows = state.reports.slice(-8).map(report => treeRow(report.id, report.name, "Report", false, "red"));
      treeBody.innerHTML = `
        ${treeGroup("Sketch Entities", entityRows, state.entities.length)}
        ${treeGroup("Dimensions", dimRows, state.dimensions.length)}
        ${treeGroup("Features", featureRows, state.features.length)}
        ${treeGroup("Assembly", componentRows + mateRows, state.components.length + state.mates.length)}
        ${treeGroup("Evaluate", reportRows, state.reports.length)}
      `;
    }

    function treeGroup(title, rows, count) {
      return `
        <section class="tree-group">
          <h2 class="tree-group-title"><span>${title}</span><span>${count}</span></h2>
          ${rows || `<div class="mini-row"><strong>Empty</strong><span class="pill">0</span></div>`}
        </section>
      `;
    }

    function treeRow(idValue, name, type, selected, color) {
      return `
        <div class="tree-item ${selected ? "selected" : ""}" data-tree-id="${idValue}">
          <span class="tree-dot ${color}"></span>
          <span class="tree-name">${escapeHtml(name)}</span>
          <span class="tree-count">${escapeHtml(type)}</span>
        </div>
      `;
    }

    function renderProps() {
      const selected = state.entities.find(entity => entity.id === state.selected[0]);
      const metrics = computeMetrics();
      const reports = state.reports.slice(-6).reverse().map(report => `
        <div class="mini-row"><strong>${escapeHtml(report.name)}</strong><span class="pill">${report.value}</span></div>
      `).join("");
      propsBody.innerHTML = `
        <section class="property-section">
          <h3>Active Tool</h3>
          <div class="property-grid">
            <div class="field">
              <label>Workspace</label>
              <input value="${escapeHtml(state.activeTab)}" readonly>
            </div>
            <div class="field">
              <label>Tool</label>
              <input value="${escapeHtml(toolName(state.tool))}" readonly>
            </div>
            <div class="field">
              <label>Units</label>
              <select data-prop="unit">
                ${["mm", "inch"].map(unit => `<option value="${unit}" ${state.unit === unit ? "selected" : ""}>${unit}</option>`).join("")}
              </select>
            </div>
            <div class="field">
              <label>Snap</label>
              <select data-prop="snap">
                <option value="true" ${state.snap ? "selected" : ""}>On</option>
                <option value="false" ${!state.snap ? "selected" : ""}>Off</option>
              </select>
            </div>
            <div class="field">
              <label>Grid</label>
              <input type="number" min="1" step="1" value="${state.snapSize}" data-prop="snapSize">
            </div>
            <div class="field">
              <label>Depth (${state.unit})</label>
              <input type="number" step="5" value="${state.depth || 40}" data-prop="depth">
            </div>
            <div class="field full">
              <label>Live Extrude Depth</label>
              <input type="range" min="2" max="220" step="1" value="${state.depth || 40}" data-live-prop="depth">
            </div>
          </div>
        </section>

        <section class="property-section">
          <h3>Selection</h3>
          ${selected ? selectedProperties(selected) : `<div class="list-box"><div class="mini-row"><strong>${state.selectedComponents.length ? `${state.selectedComponents.length} component(s)` : "No sketch selection"}</strong><span class="pill">${state.tool}</span></div></div>`}
        </section>

        <section class="property-section">
          <h3>Quick Actions</h3>
          <div class="action-grid">
            <button class="action-btn primary" data-action="extrude">Extrude</button>
            <button class="action-btn" data-action="hole">Hole</button>
            <button class="action-btn" data-action="linearPattern">Linear Pattern</button>
            <button class="action-btn" data-action="standardViews">Drawing</button>
            <button class="action-btn" data-action="massProperties">Mass</button>
            <button class="action-btn" data-action="insertComponent">Component</button>
          </div>
        </section>

        <section class="property-section">
          <h3>Live Metrics</h3>
          <div class="list-box">
            <div class="mini-row"><strong>Entities</strong><span class="pill">${state.entities.length}</span></div>
            <div class="mini-row"><strong>Closed Profiles</strong><span class="pill">${closedEntities().length}</span></div>
            <div class="mini-row"><strong>Area</strong><span class="pill">${format(metrics.area)}</span></div>
            <div class="mini-row"><strong>Perimeter</strong><span class="pill">${format(metrics.perimeter)}</span></div>
            <div class="mini-row"><strong>Volume</strong><span class="pill">${format(metrics.volume)}</span></div>
          </div>
        </section>

        <section class="property-section">
          <h3>Reports</h3>
          <div class="list-box">${reports || `<div class="mini-row"><strong>No reports yet</strong><span class="pill">0</span></div>`}</div>
        </section>
      `;
    }

    function selectedProperties(entity) {
      const fields = [];
      if (entity.type === "line" || entity.type === "centerline") {
        fields.push(field("X1", "x1", entity.x1), field("Y1", "y1", entity.y1), field("X2", "x2", entity.x2), field("Y2", "y2", entity.y2));
      } else if (entity.type === "rect") {
        fields.push(field("X", "x", entity.x), field("Y", "y", entity.y), field("Width", "w", entity.w), field("Height", "h", entity.h));
      } else if (entity.type === "circle") {
        fields.push(field("X", "x", entity.x), field("Y", "y", entity.y), field("Radius", "r", entity.r));
      } else if (entity.type === "polygon") {
        fields.push(field("X", "x", entity.x), field("Y", "y", entity.y), field("Radius", "r", entity.r), field("Sides", "sides", entity.sides));
      } else if (entity.type === "slot") {
        fields.push(field("X1", "x1", entity.x1), field("Y1", "y1", entity.y1), field("X2", "x2", entity.x2), field("Y2", "y2", entity.y2), field("Radius", "r", entity.r));
      } else if (entity.type === "text") {
        fields.push(`<div class="field full"><label>Text</label><input value="${escapeHtml(entity.text)}" data-selected-prop="text"></div>`);
      }
      return `
        <div class="property-grid">
          <div class="field full"><label>Name</label><input value="${escapeHtml(entity.name || entity.type)}" data-selected-prop="name"></div>
          ${fields.join("")}
        </div>
      `;
    }

    function field(label, prop, value) {
      return `<div class="field"><label>${label}</label><input type="number" step="1" value="${Number(value || 0).toFixed(2)}" data-selected-prop="${prop}"></div>`;
    }

    function renderOverlay() {
      const metrics = computeMetrics();
      const badges = [
        `${state.activeTab}`,
        `${state.entities.length} entities`,
        `${state.features.length} features`,
        `${closedEntities().length} closed profiles`,
        `Area ${format(metrics.area)} ${state.unit}2`,
        `${isThreeWorkspace() && threeState.ready ? "Three.js viewport" : "2D sketch canvas"}`,
        `Render ${state.renderMode || "edges"}`
      ];
      if (state.sectionView) badges.push("Section active");
      viewOverlay.innerHTML = badges.map(text => `<span class="badge">${text}</span>`).join("");
    }

    function renderAll() {
      renderTabs();
      renderCommands();
      renderTree();
      renderProps();
      renderOverlay();
      render();
      projectName.textContent = state.name;
      unitReadout.textContent = state.unit === "mm" ? "MMGS" : "IPS";
      bottomMessage.textContent = `${state.entities.length} sketch entities, ${state.features.length} features, ${state.components.length} components`;
      definitionState.textContent = definitionStatus();
    }

    function resizeCanvas() {
      const rect = canvasWrap.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.floor(rect.width * dpr));
      canvas.height = Math.max(1, Math.floor(rect.height * dpr));
      canvas.style.width = `${rect.width}px`;
      canvas.style.height = `${rect.height}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      resizeThree();
      if (!state.pan.x && !state.pan.y) {
        state.pan.x = rect.width / 2;
        state.pan.y = rect.height / 2;
      }
      render();
    }

    function render() {
      const rect = canvasWrap.getBoundingClientRect();
      ctx.clearRect(0, 0, rect.width, rect.height);
      const threeActive = isThreeWorkspace() && initThree();
      canvasWrap.classList.toggle("three-active", threeActive);
      if (threeActive) {
        updateThreeScene();
        if (state.workspace === "evaluate") drawEvaluatePanel(rect.width, rect.height);
      } else {
        drawBackground(rect.width, rect.height);
        if (state.workspace === "assembly") drawAssembly(rect.width, rect.height);
        else if (state.workspace === "drawing") drawDrawing(rect.width, rect.height);
        else if (state.workspace === "evaluate") drawEvaluate(rect.width, rect.height);
        else if (state.workspace === "model") drawModel(rect.width, rect.height);
        else drawSketch();
        drawPreview();
      }
      zoomReadout.textContent = `${Math.round(state.zoom * 100)}%`;
      viewTitle.textContent = `${state.activeTab} - ${viewLabel()}`;
      renderOverlay();
    }

    function isThreeWorkspace() {
      return ["model", "assembly", "evaluate"].includes(state.workspace);
    }

    function initThree() {
      if (threeState.ready) return true;
      if (!window.THREE || !threeViewport) {
        if (!threeState.missing) {
          threeState.missing = true;
          statusMessage.textContent = "Three.js viewport unavailable; using 2D fallback";
        }
        return false;
      }

      const THREE = window.THREE;
      threeState.scene = new THREE.Scene();
      threeState.scene.background = new THREE.Color(0xf8fbfd);
      threeState.camera = new THREE.PerspectiveCamera(35, 1, 0.1, 5000);
      threeState.camera.position.set(260, -260, 220);

      threeState.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, preserveDrawingBuffer: true });
      threeState.renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      threeState.renderer.outputEncoding = THREE.sRGBEncoding;
      threeState.renderer.localClippingEnabled = true;
      threeViewport.appendChild(threeState.renderer.domElement);

      threeState.modelGroup = new THREE.Group();
      threeState.helperGroup = new THREE.Group();
      threeState.scene.add(threeState.modelGroup, threeState.helperGroup);
      threeState.scene.add(new THREE.AmbientLight(0xffffff, 0.48));
      const hemi = new THREE.HemisphereLight(0xffffff, 0xdde7ee, 0.42);
      threeState.scene.add(hemi);
      const key = new THREE.DirectionalLight(0xffffff, 0.88);
      key.position.set(220, -300, 420);
      threeState.scene.add(key);
      const fill = new THREE.DirectionalLight(0xdcefff, 0.38);
      fill.position.set(-240, 180, 160);
      threeState.scene.add(fill);

      threeState.raycaster = new THREE.Raycaster();
      threeState.pointer = new THREE.Vector2();
      threeState.clipPlane = new THREE.Plane(new THREE.Vector3(-1, 0, 0), 0);
      if (THREE.OrbitControls) {
        threeState.controls = new THREE.OrbitControls(threeState.camera, canvasWrap);
        threeState.controls.enableDamping = true;
        threeState.controls.dampingFactor = 0.08;
        threeState.controls.screenSpacePanning = true;
        threeState.controls.target.set(0, 0, 20);
      }
      resizeThree();
      threeState.ready = true;
      if (!threeState.animationStarted) {
        threeState.animationStarted = true;
        animateThree();
      }
      return true;
    }

    function animateThree() {
      requestAnimationFrame(animateThree);
      if (!threeState.ready) return;
      if (threeState.controls) threeState.controls.update();
      threeState.renderer.render(threeState.scene, threeState.camera);
    }

    function resizeThree() {
      if (!threeState.ready) return;
      const rect = canvasWrap.getBoundingClientRect();
      const width = Math.max(1, Math.floor(rect.width));
      const height = Math.max(1, Math.floor(rect.height));
      threeState.camera.aspect = width / height;
      threeState.camera.updateProjectionMatrix();
      threeState.renderer.setSize(width, height, false);
    }

    function clearThreeGroup(group) {
      if (!group) return;
      while (group.children.length) {
        const child = group.children.pop();
        child.traverse(item => {
          if (item.geometry) item.geometry.dispose();
          if (item.material) {
            const materials = Array.isArray(item.material) ? item.material : [item.material];
            materials.forEach(material => material.dispose && material.dispose());
          }
        });
      }
    }

    function updateThreeScene() {
      if (!threeState.ready) return;
      resizeThree();
      clearThreeGroup(threeState.modelGroup);
      clearThreeGroup(threeState.helperGroup);
      threeState.interactive = [];
      threeState.hovered = null;
      threeState.renderer.localClippingEnabled = Boolean(state.sectionView);

      buildThreeGrid();
      if (state.workspace === "assembly") buildThreeAssembly();
      else buildThreeModel();
      buildThreeReferences();
      buildThreeSketchWire();
      buildThreeAnalysisEffects();

      if (threeState.lastView !== state.view || !threeState.fittedOnce) {
        fitThreeCamera(state.view);
        threeState.lastView = state.view;
        threeState.fittedOnce = true;
      }
    }

    function buildThreeGrid() {
      const THREE = window.THREE;
      const grid = new THREE.Group();
      grid.visible = state.grid;
      const size = 520;
      const step = Math.max(5, Number(state.snapSize || 10));
      const minor = new THREE.LineBasicMaterial({ color: 0xd8e2ea, transparent: true, opacity: 0.72 });
      const xAxis = new THREE.LineBasicMaterial({ color: 0xd71920, transparent: true, opacity: 0.5 });
      const yAxis = new THREE.LineBasicMaterial({ color: 0x087d83, transparent: true, opacity: 0.55 });
      for (let i = -size; i <= size; i += step) {
        grid.add(line3([{ x: -size, y: i, z: 0 }, { x: size, y: i, z: 0 }], Math.abs(i) < 0.001 ? xAxis : minor));
        grid.add(line3([{ x: i, y: -size, z: 0 }, { x: i, y: size, z: 0 }], Math.abs(i) < 0.001 ? yAxis : minor));
      }
      const zAxis = line3([{ x: 0, y: 0, z: 0 }, { x: 0, y: 0, z: 180 }], new THREE.LineBasicMaterial({ color: 0x285f9f, transparent: true, opacity: 0.55 }));
      grid.add(zAxis);
      threeState.helperGroup.add(grid);
    }

    function buildThreeModel() {
      const closed = closedEntities();
      const cutFeatures = state.features.filter(feature => feature.type === "cut");
      const cutIds = new Set(cutFeatures.flatMap(feature => feature.sources || []));
      const cutEntities = closed.filter(entity => cutIds.has(entity.id));
      const solidFeatures = state.features.filter(feature => isSolidFeature(feature.type));
      const baseSources = solidFeatures.length
        ? solidFeatures.flatMap(feature => (feature.sources || []).map(sourceId => ({ feature, entity: state.entities.find(entity => entity.id === sourceId) })))
        : closed.filter(entity => !cutIds.has(entity.id)).map(entity => ({ feature: null, entity }));
      const usableSources = baseSources.filter(item => item.entity && isClosedProfile(item.entity) && !cutIds.has(item.entity.id));

      if (!usableSources.length && closed.length) {
        closed.filter(entity => !cutIds.has(entity.id)).forEach(entity => addThreeProfile(entity, null, cutEntities));
      } else {
        usableSources.forEach(item => addThreeProfile(item.entity, item.feature, cutEntities));
      }

      state.features.filter(feature => ["surface", "thicken"].includes(feature.type)).forEach((feature, index) => {
        const entity = sourceEntity(feature) || closed[index % Math.max(1, closed.length)];
        if (entity) addThreeSurface(entity, feature);
      });

      state.features.filter(feature => ["weldment", "routing", "cam", "electrical"].includes(feature.type)).forEach(feature => {
        (feature.sources || []).map(sourceId => state.entities.find(entity => entity.id === sourceId)).filter(Boolean).forEach(entity => {
          if (entity.type === "line" || entity.type === "centerline") addThreeCylinderBetween(entity, feature);
        });
      });

      cutEntities.forEach(entity => addThreeCutMarker(entity));
    }

    function buildThreeAssembly() {
      const THREE = window.THREE;
      if (!state.components.length) {
        buildThreeModel();
        return;
      }
      state.components.forEach((component, index) => {
        const selected = state.selectedComponents.includes(component.id);
        const depth = 28 + index * 4;
        const material = bodyMaterial(selected ? 0xdff3f4 : 0xf0f5f7, selected ? 0x087d83 : 0x526678);
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(component.w, component.h, depth), material);
        mesh.position.set(component.x, component.y, depth / 2);
        mesh.rotation.z = (component.angle || 0) * Math.PI / 180;
        mesh.userData = { componentId: component.id, label: component.name, exportable: true };
        threeState.modelGroup.add(mesh);
        threeState.interactive.push(mesh);
        addEdges(mesh, selected ? 0xd71920 : 0x526678);
      });
      state.mates.forEach((mate, index) => {
        const a = state.components.find(component => component.id === mate.components[0]);
        const b = state.components.find(component => component.id === mate.components[1]);
        if (!a || !b) return;
        const material = new THREE.LineDashedMaterial({ color: index % 2 ? 0xb66b00 : 0x087d83, dashSize: 7, gapSize: 5 });
        const line = line3([{ x: a.x, y: a.y, z: 44 }, { x: b.x, y: b.y, z: 44 }], material);
        line.computeLineDistances();
        threeState.modelGroup.add(line);
      });
    }

    function addThreeProfile(entity, feature, cutEntities) {
      const THREE = window.THREE;
      const depth = Number((feature && feature.depth) || state.depth || 40);
      const holes = cutEntities.filter(cut => cut.id !== entity.id && cutInsideEntity(entity, cut));
      const shape = shapeFromEntity(entity, holes);
      if (!shape) return;
      const bevel = Number(entity.fillet || 0) > 0;
      const geometry = new THREE.ExtrudeGeometry(shape, {
        depth,
        bevelEnabled: bevel,
        bevelSize: Math.min(Math.abs(entity.fillet || 0), Math.max(1, Math.min(depth, 12))),
        bevelThickness: Math.min(Math.abs(entity.fillet || 0), Math.max(1, depth * 0.18)),
        bevelSegments: bevel ? 8 : 1,
        curveSegments: 48,
        steps: 1
      });
      geometry.computeVertexNormals();
      const selected = state.selected.includes(entity.id);
      const color = featureColor(feature ? feature.type : "extrude", selected);
      const material = bodyMaterial(color, selected ? 0xd71920 : 0x526678);
      const mesh = new THREE.Mesh(geometry, material);
      mesh.userData = { entityId: entity.id, featureId: feature && feature.id, label: entity.name || entity.type, exportable: true };
      threeState.modelGroup.add(mesh);
      threeState.interactive.push(mesh);
      addEdges(mesh, selected ? 0xd71920 : 0x526678);
    }

    function addThreeSurface(entity, feature) {
      const THREE = window.THREE;
      const shape = shapeFromEntity(entity, []);
      if (!shape) return;
      const geometry = new THREE.ShapeGeometry(shape, 48);
      const material = new THREE.MeshStandardMaterial({
        color: 0x9fe7ea,
        transparent: true,
        opacity: 0.42,
        roughness: 0.48,
        metalness: 0.04,
        side: THREE.DoubleSide,
        clippingPlanes: sectionPlanes()
      });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.z = Number(feature.depth || state.depth || 40) + 3;
      mesh.userData = { featureId: feature.id, exportable: false };
      threeState.modelGroup.add(mesh);
      addEdges(mesh, 0x087d83);
    }

    function addThreeCylinderBetween(entity, feature) {
      const THREE = window.THREE;
      const a = new THREE.Vector3(entity.x1, entity.y1, 18);
      const b = new THREE.Vector3(entity.x2, entity.y2, 18);
      const length = a.distanceTo(b);
      if (!length) return;
      const geometry = new THREE.CylinderGeometry(8, 8, length, 24);
      const material = bodyMaterial(featureColor(feature.type, false), 0x526678);
      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.copy(a).add(b).multiplyScalar(0.5);
      mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), b.clone().sub(a).normalize());
      mesh.userData = { featureId: feature.id, label: feature.name, exportable: true };
      threeState.modelGroup.add(mesh);
      threeState.interactive.push(mesh);
      addEdges(mesh, 0x526678);
    }

    function addThreeCutMarker(entity) {
      const THREE = window.THREE;
      if (entity.type !== "circle" && entity.type !== "slot") return;
      const depth = Number(state.depth || 40) + 4;
      const material = new THREE.MeshStandardMaterial({
        color: 0xd71920,
        transparent: true,
        opacity: 0.16,
        roughness: 0.55,
        side: THREE.DoubleSide,
        clippingPlanes: sectionPlanes()
      });
      if (entity.type === "circle") {
        const mesh = new THREE.Mesh(new THREE.CylinderGeometry(Math.abs(entity.r), Math.abs(entity.r), depth, 48, 1, true), material);
        mesh.position.set(entity.x, entity.y, depth / 2 - 2);
        mesh.rotation.x = Math.PI / 2;
        mesh.userData = { entityId: entity.id, label: "Cut preview", exportable: false };
        threeState.modelGroup.add(mesh);
        addEdges(mesh, 0xd71920);
      } else {
        const shape = shapeFromEntity(entity, []);
        if (!shape) return;
        const geometry = new THREE.ExtrudeGeometry(shape, { depth, bevelEnabled: false, curveSegments: 32 });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.userData = { entityId: entity.id, label: "Cut preview", exportable: false };
        threeState.modelGroup.add(mesh);
        addEdges(mesh, 0xd71920);
      }
    }

    function buildThreeReferences() {
      const THREE = window.THREE;
      state.features.filter(feature => feature.type === "plane" || feature.type === "axis").forEach(feature => {
        if (feature.type === "axis") {
          threeState.helperGroup.add(line3([{ x: -220, y: -120, z: 4 }, { x: 220, y: 120, z: 4 }], new THREE.LineDashedMaterial({ color: 0x087d83, dashSize: 10, gapSize: 6 })));
        } else {
          const material = new THREE.LineDashedMaterial({ color: 0xd71920, dashSize: 10, gapSize: 6 });
          const line = line3([
            { x: -150, y: -90, z: 4 },
