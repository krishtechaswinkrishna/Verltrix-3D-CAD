            { x: 150, y: 90, z: 4 },
            { x: -150, y: 90, z: 4 },
            { x: -150, y: -90, z: 4 }
          ], material);
          line.computeLineDistances();
          threeState.helperGroup.add(line);
        }
      });
    }

    function buildThreeSketchWire() {
      const THREE = window.THREE;
      const z = Math.max(4, Number(state.depth || 40) + 2);
      state.entities.forEach(entity => {
        const selected = state.selected.includes(entity.id);
        const material = new THREE.LineBasicMaterial({ color: selected ? 0xd71920 : 0x087d83, transparent: true, opacity: selected ? 0.95 : 0.56 });
        const lines = entityLines(entity, z);
        lines.forEach(points => threeState.helperGroup.add(line3(points, material)));
      });
    }

    function buildThreeAnalysisEffects() {
      const THREE = window.THREE;
      if (state.appearance === "flow") {
        const material = new THREE.LineBasicMaterial({ color: 0x087d83, transparent: true, opacity: 0.72 });
        for (let y = -110; y <= 110; y += 44) {
          const points = [];
          for (let i = 0; i <= 36; i++) {
            const t = i / 36;
            const x = -180 + t * 360;
            points.push({ x, y: y + Math.sin(t * Math.PI * 2) * 12, z: 90 + Math.cos(t * Math.PI) * 18 });
          }
          threeState.helperGroup.add(line3(points, material));
        }
      }
      if (state.appearance === "visualize" || state.reports.some(report => report.name === "Zebra Stripes")) {
        const material = new THREE.LineBasicMaterial({ color: state.appearance === "visualize" ? 0xd71920 : 0x18212b, transparent: true, opacity: 0.2 });
        for (let x = -260; x <= 260; x += 38) {
          threeState.helperGroup.add(line3([{ x, y: -240, z: 145 }, { x: x + 180, y: 240, z: 145 }], material));
        }
      }
      if (state.sectionView) {
        const plane = new THREE.Mesh(
          new THREE.PlaneGeometry(260, 220),
          new THREE.MeshBasicMaterial({ color: 0xd71920, transparent: true, opacity: 0.08, side: THREE.DoubleSide })
        );
        plane.rotation.y = Math.PI / 2;
        threeState.helperGroup.add(plane);
      }
    }

    function bodyMaterial(color, edgeColor) {
      const THREE = window.THREE;
      const mode = state.renderMode || "edges";
      return new THREE.MeshStandardMaterial({
        color,
        roughness: state.appearance === "visualize" ? 0.18 : 0.46,
        metalness: state.appearance === "visualize" ? 0.34 : 0.04,
        wireframe: mode === "wireframe",
        emissive: new THREE.Color(0x000000),
        clippingPlanes: sectionPlanes()
      });
    }

    function featureColor(type, selected) {
      if (selected) return 0xffe7e8;
      if (state.appearance === "stress") return type === "cut" ? 0xd71920 : 0xe4b34f;
      if (["surface", "thicken"].includes(type)) return 0x9fe7ea;
      if (["sheetmetal"].includes(type)) return 0xe9f3ff;
      if (["weldment", "routing"].includes(type)) return 0xdfeadf;
      if (["mold"].includes(type)) return 0xf3e8df;
      return 0xdff3f4;
    }

    function sectionPlanes() {
      return state.sectionView && threeState.clipPlane ? [threeState.clipPlane] : [];
    }

    function addEdges(mesh, color) {
      if ((state.renderMode || "edges") === "shaded") return;
      const THREE = window.THREE;
      const geometry = new THREE.EdgesGeometry(mesh.geometry, 24);
      const material = new THREE.LineBasicMaterial({ color, transparent: true, opacity: state.renderMode === "wireframe" ? 0.25 : 0.72, clippingPlanes: sectionPlanes() });
      const edges = new THREE.LineSegments(geometry, material);
      edges.position.copy(mesh.position);
      edges.rotation.copy(mesh.rotation);
      edges.scale.copy(mesh.scale);
      edges.quaternion.copy(mesh.quaternion);
      edges.userData = { exportable: false };
      threeState.modelGroup.add(edges);
    }

    function line3(points, material) {
      const THREE = window.THREE;
      const geometry = new THREE.BufferGeometry().setFromPoints(points.map(point => new THREE.Vector3(point.x, point.y, point.z || 0)));
      return new THREE.Line(geometry, material);
    }

    function shapeFromEntity(entity, holes = []) {
      const THREE = window.THREE;
      let shape = null;
      if (entity.type === "rect") shape = rectShape(entity);
      if (entity.type === "circle") {
        shape = new THREE.Shape();
        shape.absarc(entity.x, entity.y, Math.abs(entity.r), 0, Math.PI * 2, false);
      }
      if (entity.type === "polygon") {
        const points = polygonPoints(entity);
        shape = new THREE.Shape();
        points.forEach((point, index) => index ? shape.lineTo(point.x, point.y) : shape.moveTo(point.x, point.y));
        shape.closePath();
      }
      if (entity.type === "slot") shape = slotShape(entity);
      if (!shape) return null;
      holes.forEach(hole => {
        const path = holePath(hole);
        if (path) shape.holes.push(path);
      });
      return shape;
    }

    function rectShape(entity) {
      const THREE = window.THREE;
      const b = boundsOf(entity);
      const x = b.x;
      const y = b.y;
      const w = b.w;
      const h = b.h;
      const fillet = Math.min(Math.abs(entity.fillet || 0), w / 2, h / 2);
      const chamfer = !fillet ? Math.min(Math.abs(entity.chamfer || 0), w / 2, h / 2) : 0;
      const shape = new THREE.Shape();
      if (fillet) {
        shape.moveTo(x + fillet, y);
        shape.lineTo(x + w - fillet, y);
        shape.quadraticCurveTo(x + w, y, x + w, y + fillet);
        shape.lineTo(x + w, y + h - fillet);
        shape.quadraticCurveTo(x + w, y + h, x + w - fillet, y + h);
        shape.lineTo(x + fillet, y + h);
        shape.quadraticCurveTo(x, y + h, x, y + h - fillet);
        shape.lineTo(x, y + fillet);
        shape.quadraticCurveTo(x, y, x + fillet, y);
      } else if (chamfer) {
        shape.moveTo(x + chamfer, y);
        shape.lineTo(x + w - chamfer, y);
        shape.lineTo(x + w, y + chamfer);
        shape.lineTo(x + w, y + h - chamfer);
        shape.lineTo(x + w - chamfer, y + h);
        shape.lineTo(x + chamfer, y + h);
        shape.lineTo(x, y + h - chamfer);
        shape.lineTo(x, y + chamfer);
      } else {
        shape.moveTo(x, y);
        shape.lineTo(x + w, y);
        shape.lineTo(x + w, y + h);
        shape.lineTo(x, y + h);
      }
      shape.closePath();
      return shape;
    }

    function slotShape(entity) {
      const THREE = window.THREE;
      const shape = new THREE.Shape();
      addSlotPath(shape, entity, false);
      return shape;
    }

    function holePath(entity) {
      const THREE = window.THREE;
      if (entity.type === "circle") {
        const path = new THREE.Path();
        path.absarc(entity.x, entity.y, Math.abs(entity.r), 0, Math.PI * 2, true);
        return path;
      }
      if (entity.type === "slot") {
        const path = new THREE.Path();
        addSlotPath(path, entity, true);
        return path;
      }
      return null;
    }

    function addSlotPath(path, entity, clockwise) {
      const r = Math.abs(entity.r || 1);
      const dx = entity.x2 - entity.x1;
      const dy = entity.y2 - entity.y1;
      const length = Math.hypot(dx, dy) || 1;
      const nx = -dy / length;
      const ny = dx / length;
      const angle = Math.atan2(ny, nx);
      const a = { x: entity.x1, y: entity.y1 };
      const b = { x: entity.x2, y: entity.y2 };
      if (clockwise) {
        path.moveTo(a.x - nx * r, a.y - ny * r);
        path.lineTo(b.x - nx * r, b.y - ny * r);
        path.absarc(b.x, b.y, r, angle + Math.PI, angle, true);
        path.lineTo(a.x + nx * r, a.y + ny * r);
        path.absarc(a.x, a.y, r, angle, angle + Math.PI, true);
      } else {
        path.moveTo(a.x + nx * r, a.y + ny * r);
        path.lineTo(b.x + nx * r, b.y + ny * r);
        path.absarc(b.x, b.y, r, angle, angle + Math.PI, false);
        path.lineTo(a.x - nx * r, a.y - ny * r);
        path.absarc(a.x, a.y, r, angle + Math.PI, angle, false);
      }
      path.closePath();
    }

    function entityLines(entity, z) {
      if (entity.type === "line" || entity.type === "centerline") return [[{ x: entity.x1, y: entity.y1, z }, { x: entity.x2, y: entity.y2, z }]];
      if (entity.type === "rect") {
        const b = boundsOf(entity);
        return [[
          { x: b.x, y: b.y, z },
          { x: b.x + b.w, y: b.y, z },
          { x: b.x + b.w, y: b.y + b.h, z },
          { x: b.x, y: b.y + b.h, z },
          { x: b.x, y: b.y, z }
        ]];
      }
      if (entity.type === "circle" || entity.type === "arc") {
        const start = entity.type === "arc" ? entity.start : 0;
        const end = entity.type === "arc" ? entity.end : Math.PI * 2;
        const steps = 64;
        const points = [];
        for (let i = 0; i <= steps; i++) {
          const t = start + (end - start) * i / steps;
          points.push({ x: entity.x + Math.cos(t) * entity.r, y: entity.y + Math.sin(t) * entity.r, z });
        }
        return [points];
      }
      if (entity.type === "polygon") return [[...polygonPoints(entity).map(point => ({ ...point, z })), { ...polygonPoints(entity)[0], z }]];
      if (entity.type === "slot") {
        const shape = slotShape(entity);
        return [shape.getPoints(48).map(point => ({ x: point.x, y: point.y, z }))];
      }
      if (entity.type === "spline") return [entity.points.map(point => ({ x: point.x, y: point.y, z }))];
      return [];
    }

    function isClosedProfile(entity) {
      return entity && ["rect", "circle", "polygon", "slot"].includes(entity.type);
    }

    function isSolidFeature(type) {
      return ["extrude", "revolve", "sweep", "loft", "boundary", "sheetmetal", "shell", "draft", "rib", "wrap", "dome", "flex", "freeform", "scale", "mold", "toolbox"].includes(type);
    }

    function sourceEntity(feature) {
      return (feature.sources || []).map(sourceId => state.entities.find(entity => entity.id === sourceId)).find(Boolean);
    }

    function cutInsideEntity(base, cut) {
      const center = entityCenter(cut);
      if (base.type === "rect") {
        const b = boundsOf(base);
        return center.x > b.x && center.x < b.x + b.w && center.y > b.y && center.y < b.y + b.h;
      }
      if (base.type === "circle") return dist(base, center) + Math.abs(cut.r || 0) < Math.abs(base.r);
      if (base.type === "polygon") return pointInPolygon(center, polygonPoints(base));
      if (base.type === "slot") return entityHit(base, center, 0);
      return false;
    }

    function fitThreeCamera(view = "iso") {
      if (!threeState.ready) return;
      const THREE = window.THREE;
      const box = new THREE.Box3().setFromObject(threeState.modelGroup);
      const empty = !Number.isFinite(box.min.x) || box.isEmpty();
      const center = empty ? new THREE.Vector3(0, 0, 30) : box.getCenter(new THREE.Vector3());
      const size = empty ? new THREE.Vector3(240, 160, 90) : box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z, 120);
      const fov = THREE.MathUtils.degToRad(threeState.camera.fov);
      const distance = Math.max(180, maxDim / (2 * Math.tan(fov / 2)) * 1.6);
      const directions = {
        front: new THREE.Vector3(0, 0, 1),
        top: new THREE.Vector3(0, 1, 0.12),
        iso: new THREE.Vector3(1, -1.15, 0.85)
      };
      const direction = (directions[view] || directions.iso).normalize();
      threeState.camera.position.copy(center).add(direction.multiplyScalar(distance));
      threeState.camera.near = Math.max(0.1, distance / 200);
      threeState.camera.far = distance * 20;
      threeState.camera.lookAt(center);
      threeState.camera.updateProjectionMatrix();
      if (threeState.controls) {
        threeState.controls.target.copy(center);
        threeState.controls.update();
      }
    }

    function changeThreeZoom(factor) {
      if (!threeState.ready || !threeState.controls) return;
      const offset = threeState.camera.position.clone().sub(threeState.controls.target);
      offset.multiplyScalar(1 / factor);
      threeState.camera.position.copy(threeState.controls.target).add(offset);
      threeState.controls.update();
    }

    function cycleRenderMode() {
      const modes = ["edges", "shaded", "wireframe"];
      const next = modes[(modes.indexOf(state.renderMode || "edges") + 1) % modes.length];
      state.renderMode = next;
      notify(`Render mode: ${next}`);
      renderAll();
    }

    function toggleSectionView() {
      state.sectionView = !state.sectionView;
      notify(state.sectionView ? "Section view enabled" : "Section view disabled");
      renderAll();
    }

    function pickThree(event) {
      if (!threeState.ready) return null;
      const rect = canvasWrap.getBoundingClientRect();
      threeState.pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      threeState.pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      threeState.raycaster.setFromCamera(threeState.pointer, threeState.camera);
      return threeState.raycaster.intersectObjects(threeState.interactive, true)[0] || null;
    }

    function handleThreePointerDown(event) {
      const hit = pickThree(event);
      if (!hit) return;
      const data = hit.object.userData || {};
      if (data.entityId) {
        state.selected = [data.entityId];
        state.selectedComponents = [];
        notify(`${data.label || "Profile"} selected`);
      }
      if (data.componentId) {
        state.selectedComponents = [data.componentId];
        state.selected = [];
        notify(`${data.label || "Component"} selected`);
      }
      renderAll();
    }

    function updateThreeHover(event) {
      const hit = pickThree(event);
      const object = hit && hit.object;
      if (threeState.hovered && threeState.hovered !== object && threeState.hovered.material && threeState.hovered.material.emissive) {
        threeState.hovered.material.emissive.setHex(0x000000);
      }
      if (object && object.material && object.material.emissive) {
        object.material.emissive.setHex(0x123039);
        threeState.hovered = object;
        cursorReadout.textContent = `X ${format(hit.point.x)}, Y ${format(hit.point.y)}, Z ${format(hit.point.z)}`;
      } else {
        threeState.hovered = null;
      }
    }

    function drawBackground(w, h) {
      ctx.save();
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, w, h);
      if (state.grid) {
        const step = Math.max(8, state.snapSize * state.zoom);
        const ox = state.pan.x % step;
        const oy = state.pan.y % step;
        ctx.strokeStyle = "rgba(80, 100, 120, 0.12)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (let x = ox; x <= w; x += step) {
          ctx.moveTo(x, 0);
          ctx.lineTo(x, h);
        }
        for (let y = oy; y <= h; y += step) {
          ctx.moveTo(0, y);
          ctx.lineTo(w, y);
        }
        ctx.stroke();
      }
      const origin = toScreen({ x: 0, y: 0 });
      ctx.strokeStyle = "rgba(215, 25, 32, 0.45)";
      ctx.beginPath();
      ctx.moveTo(0, origin.y);
      ctx.lineTo(w, origin.y);
      ctx.stroke();
      ctx.strokeStyle = "rgba(8, 125, 131, 0.55)";
      ctx.beginPath();
      ctx.moveTo(origin.x, 0);
      ctx.lineTo(origin.x, h);
      ctx.stroke();
      ctx.restore();
    }

    function drawSketch() {
      state.entities.forEach(entity => drawEntity(entity, state.selected.includes(entity.id)));
      state.dimensions.forEach(drawDimension);
      state.features.filter(f => f.type === "plane" || f.type === "axis").forEach(drawReference);
    }

    function drawModel(w, h) {
      drawSketch();
      const profiles = closedEntities();
      const depth = Number(state.depth || 40);
      profiles.forEach((entity, index) => drawExtrudedEntity(entity, depth + index * 8, index));
      state.features.forEach((feature, index) => drawFeatureGlyph(feature, index, w, h));
      drawAppearanceEffects(w, h);
    }

    function drawAppearanceEffects(w, h) {
      if (state.appearance === "stress") {
        const bounds = overallBounds();
        if (!bounds) return;
        const p1 = toScreen({ x: bounds.x, y: bounds.y + bounds.h });
        const p2 = toScreen({ x: bounds.x + bounds.w, y: bounds.y });
        const gradient = ctx.createLinearGradient(p1.x, p1.y, p2.x, p2.y);
        gradient.addColorStop(0, "rgba(47, 125, 70, 0.18)");
        gradient.addColorStop(0.5, "rgba(182, 107, 0, 0.18)");
        gradient.addColorStop(1, "rgba(215, 25, 32, 0.24)");
        ctx.fillStyle = gradient;
        ctx.fillRect(Math.min(p1.x, p2.x), Math.min(p1.y, p2.y), Math.abs(p2.x - p1.x), Math.abs(p2.y - p1.y));
      }
      if (state.appearance === "flow") {
        ctx.save();
        ctx.strokeStyle = "#087d83";
        ctx.fillStyle = "#087d83";
        ctx.lineWidth = 1.6;
        for (let y = 90; y < h - 80; y += 42) {
          ctx.beginPath();
          ctx.moveTo(70, y);
          ctx.bezierCurveTo(w * 0.36, y - 28, w * 0.56, y + 28, w - 86, y);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(w - 86, y);
          ctx.lineTo(w - 100, y - 6);
          ctx.lineTo(w - 100, y + 6);
          ctx.closePath();
          ctx.fill();
        }
        ctx.restore();
      }
      if (state.appearance === "visualize" || state.reports.some(report => report.name === "Zebra Stripes")) {
        ctx.save();
        ctx.strokeStyle = state.appearance === "visualize" ? "rgba(215,25,32,0.18)" : "rgba(24,33,43,0.18)";
        ctx.lineWidth = 8;
        for (let x = -h; x < w + h; x += 42) {
          ctx.beginPath();
          ctx.moveTo(x, h);
          ctx.lineTo(x + h, 0);
          ctx.stroke();
        }
        ctx.restore();
      }
    }

    function drawAssembly(w, h) {
      if (!state.components.length) {
        drawModel(w, h);
        return;
      }
      state.components.forEach(component => {
        const p = toScreen(component);
        const selected = state.selectedComponents.includes(component.id);
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate((component.angle || 0) * Math.PI / 180);
        ctx.fillStyle = selected ? "rgba(8,125,131,0.17)" : "rgba(246,248,250,0.95)";
        ctx.strokeStyle = selected ? "#087d83" : "#526678";
        ctx.lineWidth = selected ? 2.4 : 1.4;
        ctx.fillRect(-component.w * state.zoom / 2, -component.h * state.zoom / 2, component.w * state.zoom, component.h * state.zoom);
        ctx.strokeRect(-component.w * state.zoom / 2, -component.h * state.zoom / 2, component.w * state.zoom, component.h * state.zoom);
        ctx.fillStyle = "#263747";
        ctx.font = "12px Segoe UI, Arial";
        ctx.fillText(component.name, -component.w * state.zoom / 2 + 8, -component.h * state.zoom / 2 + 18);
        ctx.restore();
      });
      state.mates.forEach((mate, index) => {
        const a = state.components.find(c => c.id === mate.components[0]);
        const b = state.components.find(c => c.id === mate.components[1]);
        if (!a || !b) return;
        const pa = toScreen(a);
        const pb = toScreen(b);
        ctx.strokeStyle = index % 2 ? "#b66b00" : "#087d83";
        ctx.setLineDash([6, 5]);
        ctx.beginPath();
        ctx.moveTo(pa.x, pa.y);
        ctx.lineTo(pb.x, pb.y);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = "#ffffff";
        ctx.strokeStyle = "#d5dee6";
        const mx = (pa.x + pb.x) / 2;
        const my = (pa.y + pb.y) / 2;
        ctx.fillRect(mx - 34, my - 12, 68, 22);
        ctx.strokeRect(mx - 34, my - 12, 68, 22);
        ctx.fillStyle = "#263747";
        ctx.font = "11px Segoe UI, Arial";
        ctx.fillText(mate.type, mx - 27, my + 4);
      });
    }

    function drawDrawing(w, h) {
      ctx.save();
      ctx.fillStyle = "#fff";
      ctx.fillRect(30, 28, w - 60, h - 56);
      ctx.strokeStyle = "#2b3a48";
      ctx.lineWidth = 1.5;
      ctx.strokeRect(30, 28, w - 60, h - 56);
      ctx.strokeRect(w - 265, h - 118, 220, 74);
      ctx.font = "12px Segoe UI, Arial";
      ctx.fillStyle = "#263747";
      ctx.fillText(state.name, w - 252, h - 92);
      ctx.fillText("Scale 1:2", w - 252, h - 70);
      const views = state.drawing.views.length ? state.drawing.views : defaultViews(w, h);
      views.forEach(view => {
        ctx.strokeStyle = "#526678";
        ctx.fillStyle = "rgba(8, 125, 131, 0.08)";
        ctx.fillRect(view.x, view.y, view.w, view.h);
        ctx.strokeRect(view.x, view.y, view.w, view.h);
        ctx.fillStyle = "#263747";
        ctx.fillText(view.name, view.x + 8, view.y + 18);
        drawMiniGeometry(view.x + view.w / 2, view.y + view.h / 2, Math.min(view.w, view.h) / 3);
      });
      state.drawing.annotations.forEach((note, index) => {
        ctx.fillStyle = "#d71920";
        ctx.beginPath();
        ctx.arc(74 + index * 34, 78, 11, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#fff";
        ctx.fillText(String(index + 1), 70 + index * 34, 82);
      });
      state.drawing.tables.forEach((table, index) => {
        drawTable(58, h - 210 - index * 95, table);
      });
      ctx.restore();
    }

    function drawEvaluate(w, h) {
      drawModel(w, h);
      drawEvaluatePanel(w, h);
    }

    function drawEvaluatePanel(w, h) {
      const metrics = computeMetrics();
      const rows = [
        ["Area", format(metrics.area)],
        ["Perimeter", format(metrics.perimeter)],
        ["Volume", format(metrics.volume)],
        ["Mass", format(metrics.mass)],
        ["Entities", state.entities.length],
        ["Features", state.features.length]
      ];
      ctx.save();
      ctx.fillStyle = "rgba(255,255,255,0.93)";
      ctx.strokeStyle = "#d5dee6";
      ctx.fillRect(w - 260, 26, 224, 206);
      ctx.strokeRect(w - 260, 26, 224, 206);
      ctx.fillStyle = "#18212b";
      ctx.font = "700 14px Segoe UI, Arial";
      ctx.fillText("Evaluate", w - 240, 52);
      ctx.font = "12px Segoe UI, Arial";
      rows.forEach((row, index) => {
        const y = 82 + index * 24;
        ctx.fillStyle = "#647280";
        ctx.fillText(row[0], w - 240, y);
        ctx.fillStyle = "#18212b";
        ctx.fillText(String(row[1]), w - 130, y);
      });
      const barMax = Math.max(metrics.area, metrics.perimeter, metrics.volume, 1);
      rows.slice(0, 3).forEach((row, index) => {
        const value = Number(row[1]) || 0;
        ctx.fillStyle = ["#d71920", "#087d83", "#2f7d46"][index];
        ctx.fillRect(w - 240, 176 + index * 14, Math.max(6, 160 * value / barMax), 8);
      });
      ctx.restore();
    }

    function drawEntity(entity, selected = false) {
      ctx.save();
      ctx.lineWidth = selected ? 2.5 : 1.7;
      ctx.strokeStyle = selected ? "#d71920" : entity.type === "centerline" ? "#647280" : "#263747";
      ctx.fillStyle = selected ? "rgba(215,25,32,0.08)" : "rgba(8,125,131,0.06)";
      if (entity.fixed) ctx.strokeStyle = "#2f7d46";
      if (entity.type === "centerline") ctx.setLineDash([8, 5]);

      if (entity.type === "line" || entity.type === "centerline") {
        const a = toScreen({ x: entity.x1, y: entity.y1 });
        const b = toScreen({ x: entity.x2, y: entity.y2 });
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      } else if (entity.type === "rect") {
        const p = toScreen({ x: entity.x, y: entity.y });
        const w = entity.w * state.zoom;
        const h = -entity.h * state.zoom;
        ctx.fillRect(p.x, p.y, w, h);
        ctx.strokeRect(p.x, p.y, w, h);
        if (entity.fillet || entity.chamfer) drawModifierLabel(entity, entity.fillet ? "R" : "C");
      } else if (entity.type === "circle") {
        const p = toScreen(entity);
        ctx.beginPath();
        ctx.arc(p.x, p.y, Math.abs(entity.r * state.zoom), 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      } else if (entity.type === "arc") {
        const p = toScreen(entity);
        ctx.beginPath();
        ctx.arc(p.x, p.y, Math.abs(entity.r * state.zoom), entity.start, entity.end);
        ctx.stroke();
      } else if (entity.type === "polygon") {
        const points = polygonPoints(entity);
        drawPath(points, true, true);
      } else if (entity.type === "slot") {
        drawSlot(entity, selected);
      } else if (entity.type === "point") {
        const p = toScreen(entity);
        ctx.fillStyle = selected ? "#d71920" : "#087d83";
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
        ctx.fill();
      } else if (entity.type === "text") {
        const p = toScreen(entity);
        ctx.fillStyle = selected ? "#d71920" : "#263747";
        ctx.font = `${Math.max(10, entity.size || 18)}px Segoe UI, Arial`;
        ctx.fillText(entity.text, p.x, p.y);
      } else if (entity.type === "spline") {
        if (entity.points.length > 1) {
          ctx.beginPath();
          entity.points.forEach((point, index) => {
            const p = toScreen(point);
            if (!index) ctx.moveTo(p.x, p.y);
            else ctx.lineTo(p.x, p.y);
          });
          ctx.stroke();
        }
        entity.points.forEach(point => {
          const p = toScreen(point);
          ctx.fillStyle = "#087d83";
          ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
        });
      }
      ctx.restore();
    }

    function drawPath(points, close, fill) {
      if (!points.length) return;
      ctx.beginPath();
      points.forEach((point, index) => {
        const p = toScreen(point);
        if (!index) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
      });
      if (close) ctx.closePath();
      if (fill) ctx.fill();
      ctx.stroke();
    }

    function drawSlot(entity) {
      const a = toScreen({ x: entity.x1, y: entity.y1 });
      const b = toScreen({ x: entity.x2, y: entity.y2 });
      const r = Math.abs(entity.r * state.zoom);
      const angle = Math.atan2(b.y - a.y, b.x - a.x);
      const nx = Math.cos(angle + Math.PI / 2) * r;
      const ny = Math.sin(angle + Math.PI / 2) * r;
      ctx.beginPath();
      ctx.moveTo(a.x + nx, a.y + ny);
      ctx.lineTo(b.x + nx, b.y + ny);
      ctx.arc(b.x, b.y, r, angle + Math.PI / 2, angle - Math.PI / 2);
      ctx.lineTo(a.x - nx, a.y - ny);
      ctx.arc(a.x, a.y, r, angle - Math.PI / 2, angle + Math.PI / 2);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }

    function drawModifierLabel(entity, label) {
      const center = entityCenter(entity);
      const p = toScreen(center);
      ctx.fillStyle = "#fff";
      ctx.strokeStyle = "#d5dee6";
      ctx.fillRect(p.x - 12, p.y - 12, 24, 22);
      ctx.strokeRect(p.x - 12, p.y - 12, 24, 22);
      ctx.fillStyle = "#d71920";
      ctx.font = "700 12px Segoe UI, Arial";
      ctx.fillText(label, p.x - 4, p.y + 4);
    }

    function drawDimension(dim) {
      const entity = state.entities.find(item => item.id === dim.entityId);
      if (!entity) return;
      const c = entityCenter(entity);
      const p = toScreen({ x: c.x + 12, y: c.y + 12 });
      ctx.save();
      ctx.strokeStyle = "#b66b00";
      ctx.fillStyle = "#fff";
      ctx.lineWidth = 1.2;
      ctx.fillRect(p.x - 38, p.y - 12, 76, 22);
      ctx.strokeRect(p.x - 38, p.y - 12, 76, 22);
      ctx.fillStyle = "#4a3520";
      ctx.font = "11px Segoe UI, Arial";
      ctx.fillText(dim.label, p.x - 31, p.y + 3);
      ctx.restore();
    }

    function drawReference(feature) {
      ctx.save();
      ctx.strokeStyle = feature.type === "axis" ? "#087d83" : "#d71920";
      ctx.setLineDash([7, 5]);
      ctx.lineWidth = 1.4;
      const c = toScreen({ x: 0, y: 0 });
      if (feature.type === "axis") {
        ctx.beginPath();
        ctx.moveTo(c.x - 240, c.y - 120);
        ctx.lineTo(c.x + 240, c.y + 120);
        ctx.stroke();
      } else {
        ctx.strokeRect(c.x - 150, c.y - 90, 300, 180);
      }
      ctx.restore();
    }

    function drawPreview() {
      if (transient.preview) drawEntity(transient.preview, true);
      if (transient.splinePoints.length) {
        drawEntity({ type: "spline", points: transient.splinePoints }, true);
      }
    }

    function drawExtrudedEntity(entity, depth, index) {
      const off = Math.max(12, depth * 0.36) * state.zoom;
      ctx.save();
      ctx.globalAlpha = 0.92;
      const color = index % 3 === 0 ? "#dff3f4" : index % 3 === 1 ? "#f7e9e9" : "#edf2f5";
      if (entity.type === "rect") {
        const p1 = toScreen({ x: entity.x, y: entity.y });
        const p2 = toScreen({ x: entity.x + entity.w, y: entity.y + entity.h });
        drawExtrudedBox(Math.min(p1.x, p2.x), Math.min(p1.y, p2.y), Math.abs(p2.x - p1.x), Math.abs(p2.y - p1.y), off, color);
      } else if (entity.type === "circle") {
        const p = toScreen(entity);
        const r = Math.abs(entity.r * state.zoom);
        drawExtrudedCylinder(p.x, p.y, r, off, color);
      } else if (entity.type === "polygon" || entity.type === "slot") {
        const b = boundsOf(entity);
        const p1 = toScreen({ x: b.x, y: b.y });
        const p2 = toScreen({ x: b.x + b.w, y: b.y + b.h });
        drawExtrudedBox(Math.min(p1.x, p2.x), Math.min(p1.y, p2.y), Math.abs(p2.x - p1.x), Math.abs(p2.y - p1.y), off, color);
      }
      ctx.restore();
    }

    function drawExtrudedBox(x, y, w, h, off, color) {
      ctx.fillStyle = "rgba(24,33,43,0.08)";
      ctx.fillRect(x + off * 0.3, y + off * 0.45, w, h);
      ctx.fillStyle = color;
      ctx.strokeStyle = "#526678";
      ctx.lineWidth = 1.3;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x + off, y - off * 0.55);
      ctx.lineTo(x + off + w, y - off * 0.55);
      ctx.lineTo(x + w, y);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x + w, y);
      ctx.lineTo(x + off + w, y - off * 0.55);
      ctx.lineTo(x + off + w, y - off * 0.55 + h);
      ctx.lineTo(x + w, y + h);
      ctx.closePath();
      ctx.fillStyle = "#e7eef4";
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = "#f9fbfc";
      ctx.fillRect(x, y, w, h);
      ctx.strokeRect(x, y, w, h);
    }

    function drawExtrudedCylinder(x, y, r, off, color) {
      ctx.fillStyle = color;
      ctx.strokeStyle = "#526678";
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.ellipse(x + off, y - off * 0.5, r, r * 0.56, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x - r, y);
      ctx.lineTo(x + off - r, y - off * 0.5);
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + off + r, y - off * 0.5);
      ctx.stroke();
      ctx.fillStyle = "#fff";
      ctx.beginPath();
      ctx.ellipse(x, y, r, r * 0.56, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    }

    function drawFeatureGlyph(feature, index, w, h) {
      const x = 18;
      const y = h - 32 - index * 25;
      if (y < 50) return;
      ctx.save();
      ctx.fillStyle = feature.type === "cut" ? "#d71920" : feature.type === "surface" ? "#087d83" : "#2f7d46";
      ctx.fillRect(x, y, 9, 9);
      ctx.fillStyle = "#263747";
      ctx.font = "11px Segoe UI, Arial";
      ctx.fillText(feature.name, x + 16, y + 9);
      ctx.restore();
    }

    function drawMiniGeometry(cx, cy, size) {
      ctx.save();
      ctx.strokeStyle = "#087d83";
      ctx.fillStyle = "rgba(8,125,131,0.08)";
      if (closedEntities().some(e => e.type === "circle")) {
        ctx.beginPath();
        ctx.arc(cx, cy, size * 0.55, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      } else {
        ctx.fillRect(cx - size, cy - size * 0.55, size * 2, size * 1.1);
        ctx.strokeRect(cx - size, cy - size * 0.55, size * 2, size * 1.1);
      }
      ctx.restore();
    }

    function drawTable(x, y, table) {
      ctx.save();
      ctx.fillStyle = "#fff";
      ctx.strokeStyle = "#526678";
      ctx.fillRect(x, y, 220, 76);
      ctx.strokeRect(x, y, 220, 76);
      ctx.font = "11px Segoe UI, Arial";
      ctx.fillStyle = "#18212b";
      ctx.fillText(table.name, x + 8, y + 18);
      table.rows.slice(0, 3).forEach((row, index) => {
        ctx.fillText(row.join("  "), x + 8, y + 38 + index * 14);
      });
      ctx.restore();
    }

    function toScreen(point) {
      return {
        x: state.pan.x + point.x * state.zoom,
        y: state.pan.y - point.y * state.zoom
      };
    }

    function fromScreen(x, y) {
      let point = {
        x: (x - state.pan.x) / state.zoom,
        y: (state.pan.y - y) / state.zoom
      };
      if (state.snap) {
        point.x = Math.round(point.x / state.snapSize) * state.snapSize;
        point.y = Math.round(point.y / state.snapSize) * state.snapSize;
      }
      return point;
    }

    function canvasPoint(event) {
      const rect = canvas.getBoundingClientRect();
      return fromScreen(event.clientX - rect.left, event.clientY - rect.top);
    }

    function rawCanvasPoint(event) {
      const rect = canvas.getBoundingClientRect();
      return { x: event.clientX - rect.left, y: event.clientY - rect.top };
    }

    function addEntity(entity) {
      snapshot();
      const created = { id: id("sk"), name: defaultName(entity.type), ...entity };
      state.entities.push(created);
      state.selected = [created.id];
      state.activeTab = "Sketch";
      state.workspace = "sketch";
      state.dirty = true;
      statusMessage.textContent = `${created.name} created`;
      renderAll();
    }

    function defaultName(type) {
      const count = state.entities.filter(entity => entity.type === type).length + 1;
      return `${toolName(type)}${count}`;
    }

    function pointerDown(event) {
      if (isThreeWorkspace() && initThree()) {
        handleThreePointerDown(event);
        return;
      }
      const p = canvasPoint(event);
      const raw = rawCanvasPoint(event);
      cursorReadout.textContent = `X ${format(p.x)}, Y ${format(p.y)}`;
      if (event.button === 1 || event.altKey) {
        transient.dragId = "__pan";
        transient.dragLast = raw;
        return;
      }
      if (state.workspace === "assembly" || state.tool === "assemblyMove") {
        handleAssemblyDown(p, event);
        return;
      }
      if (state.tool === "select") {
        const hit = hitTest(p);
        state.selected = hit ? [hit.id] : [];
        transient.dragId = hit ? hit.id : null;
        transient.dragLast = p;
        transient.dragSnapshot = hit ? JSON.stringify(cleanState()) : null;
        transient.dragMoved = false;
        renderAll();
        return;
      }
      if (state.tool === "trim") {
        const hit = hitTest(p);
        if (hit) {
          snapshot();
          state.entities = state.entities.filter(entity => entity.id !== hit.id);
          state.selected = [];
          notify("Entity trimmed");
          renderAll();
        }
        return;
      }
      if (state.tool === "dimension") {
        const hit = hitTest(p);
        if (hit) addDimension(hit);
        return;
      }
      if (state.tool === "point") {
        addEntity({ type: "point", x: p.x, y: p.y });
        return;
      }
      if (state.tool === "text") {
        const text = prompt("Sketch text", "TEXT");
        if (text) addEntity({ type: "text", x: p.x, y: p.y, text, size: 18 });
        return;
      }
      if (state.tool === "arc") {
        handleArcClick(p);
        return;
      }
      if (state.tool === "spline") {
        transient.splinePoints.push(p);
        transient.drawing = true;
        render();
        return;
      }
      transient.drawing = true;
      transient.start = p;
      transient.preview = null;
    }

    function pointerMove(event) {
      if (isThreeWorkspace() && initThree()) {
        updateThreeHover(event);
        return;
      }
      const p = canvasPoint(event);
      const raw = rawCanvasPoint(event);
      cursorReadout.textContent = `X ${format(p.x)}, Y ${format(p.y)}`;
      if (transient.dragId === "__pan") {
        state.pan.x += raw.x - transient.dragLast.x;
        state.pan.y += raw.y - transient.dragLast.y;
        transient.dragLast = raw;
        render();
        return;
      }
      if (transient.dragId && state.tool === "assemblyMove") {
        const component = state.components.find(item => item.id === transient.dragId);
        if (component) {
          component.x = p.x;
          component.y = p.y;
          transient.dragMoved = true;
          render();
        }
        return;
      }
      if (transient.dragId && state.tool === "select") {
        const entity = state.entities.find(item => item.id === transient.dragId);
        if (entity && transient.dragLast) {
          translateEntity(entity, p.x - transient.dragLast.x, p.y - transient.dragLast.y);
          transient.dragLast = p;
          transient.dragMoved = true;
          render();
        }
        return;
      }
      if (!transient.drawing || !transient.start) return;
      transient.preview = previewEntity(state.tool, transient.start, p);
      render();
    }

    function pointerUp(event) {
      if (isThreeWorkspace() && initThree()) return;
      if (transient.dragId === "__pan") {
        transient.dragId = null;
        return;
      }
      if (transient.dragId && state.tool === "assemblyMove") {
        commitDragHistory();
        transient.dragId = null;
        renderAll();
        return;
      }
      if (transient.dragId && state.tool === "select") {
        commitDragHistory();
        transient.dragId = null;
        transient.dragLast = null;
        renderAll();
        return;
      }
      if (!transient.drawing || !transient.preview) return;
      if (isValidEntity(transient.preview)) addEntity(transient.preview);
      transient.drawing = false;
      transient.start = null;
      transient.preview = null;
    }

    function pointerDoubleClick() {
      if (state.tool === "spline" && transient.splinePoints.length > 1) {
        addEntity({ type: "spline", points: transient.splinePoints.slice() });
        transient.splinePoints = [];
        transient.drawing = false;
      }
    }

    function previewEntity(tool, start, end) {
      if (tool === "line" || tool === "centerline") return { type: tool, x1: start.x, y1: start.y, x2: end.x, y2: end.y };
      if (tool === "rect") return { type: "rect", x: start.x, y: start.y, w: end.x - start.x, h: end.y - start.y };
      if (tool === "circle") return { type: "circle", x: start.x, y: start.y, r: dist(start, end) };
      if (tool === "polygon") return { type: "polygon", x: start.x, y: start.y, r: dist(start, end), sides: Number(state.polygonSides || 6) };
      if (tool === "slot") return { type: "slot", x1: start.x, y1: start.y, x2: end.x, y2: end.y, r: Math.max(5, dist(start, end) * 0.18) };
      return null;
    }

    function handleArcClick(p) {
      if (transient.arcStep === 0) {
        transient.arcData = { x: p.x, y: p.y };
        transient.arcStep = 1;
        notify("Arc center set");
      } else if (transient.arcStep === 1) {
        transient.arcData.r = dist(transient.arcData, p);
        transient.arcData.start = Math.atan2(transient.arcData.y - p.y, p.x - transient.arcData.x);
        transient.arcStep = 2;
        notify("Arc start set");
      } else {
        const end = Math.atan2(transient.arcData.y - p.y, p.x - transient.arcData.x);
        addEntity({ type: "arc", ...transient.arcData, end });
        transient.arcStep = 0;
        transient.arcData = null;
      }
    }

    function isValidEntity(entity) {
      if (!entity) return false;
      if (entity.type === "line" || entity.type === "centerline") return dist({ x: entity.x1, y: entity.y1 }, { x: entity.x2, y: entity.y2 }) > 1;
      if (entity.type === "rect") return Math.abs(entity.w) > 1 && Math.abs(entity.h) > 1;
      if (entity.type === "circle" || entity.type === "polygon") return Math.abs(entity.r) > 1;
      if (entity.type === "slot") return dist({ x: entity.x1, y: entity.y1 }, { x: entity.x2, y: entity.y2 }) > 1;
      return true;
    }

    function hitTest(point) {
      const tolerance = 8 / state.zoom;
      for (let i = state.entities.length - 1; i >= 0; i--) {
        const entity = state.entities[i];
        if (entityHit(entity, point, tolerance)) return entity;
      }
      return null;
    }

    function entityHit(entity, point, tolerance) {
      if (entity.type === "line" || entity.type === "centerline") return pointToSegment(point, { x: entity.x1, y: entity.y1 }, { x: entity.x2, y: entity.y2 }) <= tolerance;
      if (entity.type === "rect") {
        const b = boundsOf(entity);
        return point.x >= b.x - tolerance && point.x <= b.x + b.w + tolerance && point.y >= b.y - tolerance && point.y <= b.y + b.h + tolerance;
      }
      if (entity.type === "circle") return Math.abs(dist(entity, point) - Math.abs(entity.r)) <= tolerance || dist(entity, point) < Math.abs(entity.r);
      if (entity.type === "polygon") return pointInPolygon(point, polygonPoints(entity));
      if (entity.type === "slot") return pointToSegment(point, { x: entity.x1, y: entity.y1 }, { x: entity.x2, y: entity.y2 }) <= Math.abs(entity.r) + tolerance;
      if (entity.type === "point") return dist(entity, point) <= tolerance * 1.5;
      if (entity.type === "text") return Math.abs(point.x - entity.x) < 60 / state.zoom && Math.abs(point.y - entity.y) < 24 / state.zoom;
      if (entity.type === "spline") return entity.points.some((p, i, arr) => i && pointToSegment(point, arr[i - 1], p) <= tolerance);
      if (entity.type === "arc") return Math.abs(dist(entity, point) - Math.abs(entity.r)) <= tolerance;
      return false;
    }

    function translateEntity(entity, dx, dy) {
      if (entity.fixed) return;
      if (["line", "centerline", "slot"].includes(entity.type)) {
        entity.x1 += dx;
        entity.y1 += dy;
        entity.x2 += dx;
        entity.y2 += dy;
      } else if (entity.type === "spline") {
        entity.points.forEach(point => {
          point.x += dx;
          point.y += dy;
        });
      } else {
        entity.x += dx;
        entity.y += dy;
      }
    }

    function polygonPoints(entity) {
      const sides = Math.max(3, Math.min(40, Number(entity.sides || 6)));
      const points = [];
      for (let i = 0; i < sides; i++) {
        const angle = -Math.PI / 2 + (Math.PI * 2 * i) / sides;
        points.push({ x: entity.x + Math.cos(angle) * entity.r, y: entity.y + Math.sin(angle) * entity.r });
      }
      return points;
    }

    function entityCenter(entity) {
      const b = boundsOf(entity);
      return { x: b.x + b.w / 2, y: b.y + b.h / 2 };
    }

    function boundsOf(entity) {
      if (entity.type === "line" || entity.type === "centerline") {
        const x = Math.min(entity.x1, entity.x2);
        const y = Math.min(entity.y1, entity.y2);
        return { x, y, w: Math.abs(entity.x2 - entity.x1), h: Math.abs(entity.y2 - entity.y1) };
      }
      if (entity.type === "rect") {
        const x = Math.min(entity.x, entity.x + entity.w);
        const y = Math.min(entity.y, entity.y + entity.h);
        return { x, y, w: Math.abs(entity.w), h: Math.abs(entity.h) };
      }
      if (entity.type === "circle" || entity.type === "arc" || entity.type === "polygon") {
        return { x: entity.x - Math.abs(entity.r), y: entity.y - Math.abs(entity.r), w: Math.abs(entity.r) * 2, h: Math.abs(entity.r) * 2 };
      }
      if (entity.type === "slot") {
        const x = Math.min(entity.x1, entity.x2) - entity.r;
        const y = Math.min(entity.y1, entity.y2) - entity.r;
        return { x, y, w: Math.abs(entity.x2 - entity.x1) + entity.r * 2, h: Math.abs(entity.y2 - entity.y1) + entity.r * 2 };
      }
      if (entity.type === "spline") {
        const xs = entity.points.map(point => point.x);
        const ys = entity.points.map(point => point.y);
        return { x: Math.min(...xs), y: Math.min(...ys), w: Math.max(...xs) - Math.min(...xs), h: Math.max(...ys) - Math.min(...ys) };
      }
      return { x: entity.x || 0, y: entity.y || 0, w: 1, h: 1 };
    }

    function closedEntities() {
      return state.entities.filter(entity => ["rect", "circle", "polygon", "slot"].includes(entity.type));
    }

        notify("Create or select a closed sketch profile first");

      snapshot();

        depth: Number(state.depth || 40),

    function handleAssemblyDown(point, event) {
      const hit = componentHit(point);
      if (hit) {
        if (event.shiftKey && !state.selectedComponents.includes(hit.id)) state.selectedComponents.push(hit.id);
        else state.selectedComponents = [hit.id];
        transient.dragId = hit.id;
        transient.dragSnapshot = JSON.stringify(cleanState());
        transient.dragMoved = false;
      } else {
        state.selectedComponents = [];
        transient.dragSnapshot = null;
        transient.dragMoved = false;
      }
      renderAll();
    }

    function componentHit(point) {
      for (let i = state.components.length - 1; i >= 0; i--) {
        const c = state.components[i];
        if (Math.abs(point.x - c.x) <= c.w / 2 && Math.abs(point.y - c.y) <= c.h / 2) return c;
      }
      return null;
    }

    function addMate(type) {
      if (state.selectedComponents.length < 2) return notify("Select two components for a mate");
      snapshot();
      const [aId, bId] = state.selectedComponents;
      const a = state.components.find(c => c.id === aId);
      const b = state.components.find(c => c.id === bId);
      if (a && b && type === "Coincident") {
        b.x = a.x + a.w / 2 + b.w / 2;
        b.y = a.y;
      }
      if (a && b && type === "Distance") {
        b.x = a.x + 120;
        b.y = a.y;
      }
      state.mates.push({ id: id("mt"), type, components: [aId, bId], value: type === "Distance" ? 120 : 0 });
      notify(`${type} mate added`);
      renderAll();
    }

    function selectedEntities() {

    function cloneEntity(entity) {
      return JSON.parse(JSON.stringify(entity));
    }

    function mirrorEntityX(entity) {
      if (entity.type === "line" || entity.type === "centerline" || entity.type === "slot") {
        entity.x1 *= -1;
        entity.x2 *= -1;
      } else if (entity.type === "spline") {
        entity.points.forEach(point => point.x *= -1);
      } else {
        entity.x *= -1;
      }
    }

    function rotateEntity(entity, angle) {
      const rotatePoint = point => {
        const x = point.x * Math.cos(angle) - point.y * Math.sin(angle);
        const y = point.x * Math.sin(angle) + point.y * Math.cos(angle);
        point.x = x;
        point.y = y;
      };
      if (entity.type === "line" || entity.type === "centerline" || entity.type === "slot") {
        const p1 = { x: entity.x1, y: entity.y1 };
        const p2 = { x: entity.x2, y: entity.y2 };
        rotatePoint(p1);
        rotatePoint(p2);
        entity.x1 = p1.x;
        entity.y1 = p1.y;
        entity.x2 = p2.x;
        entity.y2 = p2.y;
      } else if (entity.type === "spline") {
        entity.points.forEach(rotatePoint);
      } else {
        rotatePoint(entity);
      }
    }

    function commitDragHistory() {
      if (transient.dragMoved && transient.dragSnapshot) {
        state.history.push(transient.dragSnapshot);
        if (state.history.length > 80) state.history.shift();
        state.future = [];
        state.dirty = true;
        savedState.textContent = "Unsaved changes";
      }
      transient.dragSnapshot = null;
      transient.dragMoved = false;
    }

    function scaleEntity(entity, factor) {
      if (entity.type === "line" || entity.type === "centerline" || entity.type === "slot") {
        entity.x1 *= factor;
        entity.y1 *= factor;
        entity.x2 *= factor;
        entity.y2 *= factor;
        if (entity.r) entity.r *= factor;
      } else if (entity.type === "spline") {
        entity.points.forEach(point => {
          point.x *= factor;
          point.y *= factor;
        });
      } else {
        entity.x *= factor;
        entity.y *= factor;
        if (entity.r) entity.r *= factor;
        if (entity.w) entity.w *= factor;
        if (entity.h) entity.h *= factor;
      }
    }

    function computeMetrics() {
      const area = closedEntities().reduce((sum, entity) => sum + entityArea(entity), 0);
      const perimeter = state.entities.reduce((sum, entity) => sum + entityLength(entity), 0);
      const depth = Number(state.depth || 40);
      const volume = area * Math.max(1, depth);
      const mass = volume * 0.00000785;
      return { area, perimeter, volume, mass };
    }

    function entityArea(entity) {
      if (entity.type === "rect") return Math.abs(entity.w * entity.h);
      if (entity.type === "circle") return Math.PI * entity.r * entity.r;
      if (entity.type === "polygon") return polygonArea(polygonPoints(entity));
      if (entity.type === "slot") {
        const length = dist({ x: entity.x1, y: entity.y1 }, { x: entity.x2, y: entity.y2 });
        return length * entity.r * 2 + Math.PI * entity.r * entity.r;
      }
      return 0;
    }

    function entityLength(entity) {
      if (entity.type === "line" || entity.type === "centerline") return dist({ x: entity.x1, y: entity.y1 }, { x: entity.x2, y: entity.y2 });
      if (entity.type === "rect") return Math.abs(entity.w) * 2 + Math.abs(entity.h) * 2;
      if (entity.type === "circle") return Math.PI * Math.abs(entity.r) * 2;
      if (entity.type === "arc") return Math.abs(entity.end - entity.start) * Math.abs(entity.r);
      if (entity.type === "polygon") return polygonPerimeter(polygonPoints(entity));
      if (entity.type === "slot") return dist({ x: entity.x1, y: entity.y1 }, { x: entity.x2, y: entity.y2 }) * 2 + Math.PI * entity.r * 2;
      if (entity.type === "spline") return entity.points.reduce((sum, point, index, arr) => index ? sum + dist(arr[index - 1], point) : 0, 0);
      return 0;
    }

    function massPropertiesText() {
      const m = computeMetrics();
      return `Volume ${format(m.volume)} ${state.unit}3, mass ${format(m.mass)} kg`;
    }

    function sectionPropertiesText() {
      const m = computeMetrics();
      return `Projected area ${format(m.area)} ${state.unit}2, perimeter ${format(m.perimeter)} ${state.unit}`;
    }

    function geometryAnalysisText() {
      const invalid = state.entities.filter(entity => !isValidEntity(entity)).length;
      return invalid ? `${invalid} invalid entities found` : "No invalid sketch entities found";
    }

    function symmetryText() {
      const symmetric = closedEntities().some(entity => Math.abs(entityCenter(entity).x) < 0.01);
      return symmetric ? "At least one profile is centered on the vertical origin axis" : "No closed profile centered on vertical origin axis";
    }

    function definitionStatus() {
      if (!state.entities.length) return "No sketch";
      if (state.entities.some(e => e.fixed || (e.relations && e.relations.length))) return "Fully defined";
      if (state.dimensions.length) return "Partially defined";
      return "Under-defined";
    }

    function exportPng() {
      const sourceCanvas = isThreeWorkspace() && threeState.ready ? threeState.renderer.domElement : canvas;
      const url = sourceCanvas.toDataURL("image/png");

    function exportStl() {
      if (!prepareThreeExport()) return;
      const triangles = collectExportTriangles();
      if (!triangles.length) return notify("No solid mesh to export");
      const lines = [`solid ${safeName(state.name)}`];
      triangles.forEach(([a, b, c]) => {
        const normal = triangleNormal(a, b, c);
        lines.push(`  facet normal ${normal.x} ${normal.y} ${normal.z}`);
        lines.push("    outer loop");
        [a, b, c].forEach(vertex => lines.push(`      vertex ${vertex.x} ${vertex.y} ${vertex.z}`));
        lines.push("    endloop");
        lines.push("  endfacet");
      });
      lines.push(`endsolid ${safeName(state.name)}`);
      download(`${safeName(state.name)}.stl`, lines.join("\n"), "model/stl");
      notify("STL exported");
    }

    function exportObj() {
      if (!prepareThreeExport()) return;
      const THREE = window.THREE;
      const vertices = [];
      const faces = [];
      exportableMeshes().forEach(mesh => {
        mesh.updateMatrixWorld(true);
        const geometry = mesh.geometry;
        const position = geometry.attributes.position;
        const offset = vertices.length;
        for (let i = 0; i < position.count; i++) {
          vertices.push(new THREE.Vector3().fromBufferAttribute(position, i).applyMatrix4(mesh.matrixWorld));
        }
        if (geometry.index) {
          for (let i = 0; i < geometry.index.count; i += 3) {
            faces.push([geometry.index.getX(i) + 1 + offset, geometry.index.getX(i + 1) + 1 + offset, geometry.index.getX(i + 2) + 1 + offset]);
          }
        } else {
          for (let i = 0; i < position.count; i += 3) faces.push([offset + i + 1, offset + i + 2, offset + i + 3]);
        }
      });
      if (!faces.length) return notify("No solid mesh to export");
      const lines = [`o ${safeName(state.name)}`];
      vertices.forEach(vertex => lines.push(`v ${vertex.x} ${vertex.y} ${vertex.z}`));
      faces.forEach(face => lines.push(`f ${face[0]} ${face[1]} ${face[2]}`));
      download(`${safeName(state.name)}.obj`, lines.join("\n"), "model/obj");
      notify("OBJ exported");
    }

    function prepareThreeExport() {
      if (!initThree()) {
        notify("Three.js is required for mesh export");
        return false;
      }
      const originalWorkspace = state.workspace;
      if (!isThreeWorkspace()) state.workspace = "model";
      updateThreeScene();
      state.workspace = originalWorkspace;
      return true;
    }

    function exportableMeshes() {
      const meshes = [];
      if (!threeState.modelGroup) return meshes;
      threeState.modelGroup.traverse(item => {
        if (item.isMesh && item.userData && item.userData.exportable && item.geometry && item.geometry.attributes.position) meshes.push(item);
      });
      return meshes;
    }

    function collectExportTriangles() {
      const THREE = window.THREE;
      const triangles = [];
      exportableMeshes().forEach(mesh => {
        mesh.updateMatrixWorld(true);
        const geometry = mesh.geometry;
        const position = geometry.attributes.position;
        const readVertex = index => new THREE.Vector3().fromBufferAttribute(position, index).applyMatrix4(mesh.matrixWorld);
        if (geometry.index) {
          for (let i = 0; i < geometry.index.count; i += 3) {
            triangles.push([readVertex(geometry.index.getX(i)), readVertex(geometry.index.getX(i + 1)), readVertex(geometry.index.getX(i + 2))]);
          }
        } else {
          for (let i = 0; i < position.count; i += 3) triangles.push([readVertex(i), readVertex(i + 1), readVertex(i + 2)]);
        }
      });
      return triangles;
    }

    function triangleNormal(a, b, c) {
      const THREE = window.THREE;
      return new THREE.Vector3().subVectors(b, a).cross(new THREE.Vector3().subVectors(c, a)).normalize();
    }

    function packAndGo() {
      const bundle = {
        project: cleanState(),
        exportedAt: new Date().toISOString(),
        svg: sketchToSvg(),
        dxf: sketchToDxf()
      };
      download(`${safeName(state.name)}-pack-and-go.json`, JSON.stringify(bundle, null, 2), "application/json");
      notify("Project bundle created");
    }

    function defeature() {
      snapshot();
      state.features = state.features.filter(feature => ["extrude", "revolve", "sheetmetal", "weldment"].includes(feature.type));
      state.entities = state.entities.filter(entity => !entity.name || !entity.name.includes("Hole"));
      notify("Small features removed");
      renderAll();
    }

    function rebuild() {
      state.reports.push({ id: id("rp"), name: "Rebuild", value: `${state.entities.length + state.features.length} items rebuilt`, createdAt: new Date().toLocaleTimeString() });
      notify("Model rebuilt");
      renderAll();
    }

    function sketchToSvg() {
      const bounds = overallBounds() || { x: -120, y: -80, w: 240, h: 160 };
      const pad = 30;
      const minX = bounds.x - pad;
      const minY = bounds.y - pad;
      const width = bounds.w + pad * 2;
      const height = bounds.h + pad * 2;
      const map = p => `${p.x - minX},${height - (p.y - minY)}`;
      const elements = state.entities.map(entity => {
        if (entity.type === "line" || entity.type === "centerline") return `<line x1="${entity.x1 - minX}" y1="${height - (entity.y1 - minY)}" x2="${entity.x2 - minX}" y2="${height - (entity.y2 - minY)}" stroke="#18212b" fill="none"/>`;
        if (entity.type === "rect") return `<rect x="${Math.min(entity.x, entity.x + entity.w) - minX}" y="${height - (Math.max(entity.y, entity.y + entity.h) - minY)}" width="${Math.abs(entity.w)}" height="${Math.abs(entity.h)}" stroke="#18212b" fill="rgba(8,125,131,0.08)"/>`;
        if (entity.type === "circle") return `<circle cx="${entity.x - minX}" cy="${height - (entity.y - minY)}" r="${Math.abs(entity.r)}" stroke="#18212b" fill="rgba(8,125,131,0.08)"/>`;
        if (entity.type === "polygon") return `<polygon points="${polygonPoints(entity).map(map).join(" ")}" stroke="#18212b" fill="rgba(8,125,131,0.08)"/>`;
        if (entity.type === "text") return `<text x="${entity.x - minX}" y="${height - (entity.y - minY)}" font-family="Segoe UI" font-size="${entity.size || 18}">${escapeHtml(entity.text)}</text>`;
        return "";
      }).join("");
      return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${width} ${height}" width="${width}" height="${height}">${elements}</svg>`;
    }

    function sketchToDxf() {
      const lines = ["0", "SECTION", "2", "ENTITIES"];
      state.entities.forEach(entity => {
        if (entity.type === "line" || entity.type === "centerline") {
          lines.push("0", "LINE", "8", "Sketch", "10", entity.x1, "20", entity.y1, "11", entity.x2, "21", entity.y2);
        }
        if (entity.type === "circle") {
          lines.push("0", "CIRCLE", "8", "Sketch", "10", entity.x, "20", entity.y, "40", Math.abs(entity.r));
        }
        if (entity.type === "rect") {
          const pts = [
            { x: entity.x, y: entity.y },
            { x: entity.x + entity.w, y: entity.y },
            { x: entity.x + entity.w, y: entity.y + entity.h },
            { x: entity.x, y: entity.y + entity.h }
          ];
          pts.forEach((p, i) => {
            const q = pts[(i + 1) % pts.length];
            lines.push("0", "LINE", "8", "Sketch", "10", p.x, "20", p.y, "11", q.x, "21", q.y);
          });
        }
      });
      lines.push("0", "ENDSEC", "0", "EOF");
      return lines.join("\n");
    }

    function download(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 500);
    }

    function zoomFit() {
      if (isThreeWorkspace() && initThree()) {
        fitThreeCamera(state.view);
        render();
        return;
      }
      const bounds = overallBounds();
      const rect = canvasWrap.getBoundingClientRect();
      if (!bounds) {
        state.zoom = 1;
        state.pan = { x: rect.width / 2, y: rect.height / 2 };
      } else {
        state.zoom = Math.max(0.2, Math.min(4, Math.min(rect.width / (bounds.w + 120), rect.height / (bounds.h + 120))));
        state.pan = {
          x: rect.width / 2 - (bounds.x + bounds.w / 2) * state.zoom,
          y: rect.height / 2 + (bounds.y + bounds.h / 2) * state.zoom
        };
      }
      render();
    }

    function changeZoom(factor) {
      state.zoom = Math.max(0.2, Math.min(6, state.zoom * factor));
      if (isThreeWorkspace() && initThree()) {
        changeThreeZoom(factor);
        zoomReadout.textContent = `${Math.round(state.zoom * 100)}%`;
        return;
      }
      render();
    }

    function overallBounds() {
      if (!state.entities.length) return null;
      const bounds = state.entities.map(boundsOf);
      const minX = Math.min(...bounds.map(b => b.x));
      const minY = Math.min(...bounds.map(b => b.y));
      const maxX = Math.max(...bounds.map(b => b.x + b.w));
      const maxY = Math.max(...bounds.map(b => b.y + b.h));
      return { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
    }

    function viewLabel() {
      if (state.workspace === "drawing") return "Sheet";
      if (state.workspace === "assembly") return "Assembly";
      if (state.workspace === "evaluate") return "Analysis";
      return state.view === "iso" ? "Isometric" : `${state.view[0].toUpperCase()}${state.view.slice(1)} View`;
    }

    function dist(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function pointToSegment(p, a, b) {
      const l2 = (b.x - a.x) ** 2 + (b.y - a.y) ** 2;
      if (!l2) return dist(p, a);
      let t = ((p.x - a.x) * (b.x - a.x) + (p.y - a.y) * (b.y - a.y)) / l2;
      t = Math.max(0, Math.min(1, t));
      return dist(p, { x: a.x + t * (b.x - a.x), y: a.y + t * (b.y - a.y) });
    }

    function pointInPolygon(point, polygon) {
      let inside = false;
      for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
        const pi = polygon[i];
        const pj = polygon[j];
        const intersect = ((pi.y > point.y) !== (pj.y > point.y)) && (point.x < (pj.x - pi.x) * (point.y - pi.y) / (pj.y - pi.y) + pi.x);
        if (intersect) inside = !inside;
      }
      return inside;
    }

    function polygonArea(points) {
      return Math.abs(points.reduce((sum, point, index) => {
        const next = points[(index + 1) % points.length];
        return sum + point.x * next.y - next.x * point.y;
      }, 0) / 2);
    }

    function polygonPerimeter(points) {
      return points.reduce((sum, point, index) => sum + dist(point, points[(index + 1) % points.length]), 0);
    }

    function componentsOverlap(a, b) {
      return Math.abs(a.x - b.x) < (a.w + b.w) / 2 && Math.abs(a.y - b.y) < (a.h + b.h) / 2;
    }

    function format(value) {
      const number = Number(value || 0);
      if (Math.abs(number) >= 1000) return number.toFixed(0);
      if (Math.abs(number) >= 10) return number.toFixed(1);
      return number.toFixed(2);
    }

    function safeName(name) {
      return name.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "") || "cad-project";
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function notify(message) {
      statusMessage.textContent = message;
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(transient.toastTimer);
      transient.toastTimer = setTimeout(() => toast.classList.remove("show"), 1700);
    }

    commandTabs.addEventListener("click", event => {
      const button = event.target.closest("[data-tab]");
      if (button) setTab(button.dataset.tab);
    });

    commandStrip.addEventListener("click", event => {
      const button = event.target.closest(".tool-btn");
      if (!button) return;
      if (button.dataset.tool) setTool(button.dataset.tool);
      if (button.dataset.action) runCommand(button.dataset.action);
    });

    document.body.addEventListener("click", event => {
      const actionButton = event.target.closest("[data-action]");
      if (actionButton && !actionButton.classList.contains("tool-btn")) runCommand(actionButton.dataset.action);
      const viewButton = event.target.closest("[data-view]");
      if (viewButton) {
        state.view = viewButton.dataset.view;
        render();
      }
      const treeItem = event.target.closest("[data-tree-id]");
      if (treeItem) {
        const treeId = treeItem.dataset.treeId;
        if (state.entities.some(entity => entity.id === treeId)) {
          state.selected = [treeId];
          state.selectedComponents = [];
        }
        if (state.components.some(component => component.id === treeId)) {
          state.selectedComponents = [treeId];
          state.selected = [];
        }
        renderAll();
      }
    });

    extrudeDepthInput.addEventListener("input", updateExtrudePreview);
    extrudeDepthInput.addEventListener("change", updateExtrudePreview);
    extrudeConfirmBtn.addEventListener("click", confirmExtrude);
    extrudeCancelBtn.addEventListener("click", closeExtrudeDialog);
    extrudeOverlay.addEventListener("click", event => {
      if (event.target === extrudeOverlay) closeExtrudeDialog();
    });

    propsBody.addEventListener("input", event => {
      const liveProp = event.target.dataset.liveProp;
      if (!liveProp) return;
      state[liveProp] = Number(event.target.value);
      propsBody.querySelectorAll(`[data-prop="${liveProp}"]`).forEach(input => {
        if (input !== event.target) input.value = event.target.value;
      });
      render();
    });

    propsBody.addEventListener("change", event => {
      const liveProp = event.target.dataset.liveProp;
      if (liveProp) {
        snapshot();
        state[liveProp] = Number(event.target.value);
        renderAll();
        return;
      }
      const prop = event.target.dataset.prop;
      if (prop) {
        snapshot();
        if (prop === "snap") state.snap = event.target.value === "true";
        else if (prop === "unit") state.unit = event.target.value;
        else state[prop] = Number(event.target.value);
        renderAll();
      }
      const selectedProp = event.target.dataset.selectedProp;
      if (selectedProp && state.selected.length) {
        snapshot();
        const entity = state.entities.find(item => item.id === state.selected[0]);
        if (entity) entity[selectedProp] = event.target.type === "number" ? Number(event.target.value) : event.target.value;
        renderAll();
      }
    });

    canvas.addEventListener("pointerdown", pointerDown);
    canvas.addEventListener("pointermove", pointerMove);
    canvas.addEventListener("pointerup", pointerUp);
    canvas.addEventListener("pointerleave", pointerUp);
    canvas.addEventListener("dblclick", pointerDoubleClick);
    canvas.addEventListener("wheel", event => {
      if (isThreeWorkspace() && initThree()) {
        state.zoom = Math.max(0.2, Math.min(6, state.zoom * (event.deltaY > 0 ? 0.92 : 1.08)));
        zoomReadout.textContent = `${Math.round(state.zoom * 100)}%`;
        return;
      }
      event.preventDefault();
      changeZoom(event.deltaY > 0 ? 0.92 : 1.08);
    }, { passive: false });

    fileInput.addEventListener("change", event => {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        restore(reader.result);
        savedState.textContent = `Opened ${file.name}`;
        notify("Project opened");
      };
      reader.readAsText(file);
      fileInput.value = "";
    });

    window.addEventListener("resize", resizeCanvas);
    window.addEventListener("keydown", event => {
      if (event.ctrlKey && event.key.toLowerCase() === "z") {
        event.preventDefault();
        undo();
      }
      if (event.ctrlKey && event.key.toLowerCase() === "y") {
        event.preventDefault();
        redo();
      }
      if (event.key === "Escape") {
        if (extrudeOverlay.classList.contains("open")) {
          closeExtrudeDialog();
          return;
        }
        setTool("select");
      }
      if (event.key === "Enter" && state.tool === "spline" && transient.splinePoints.length > 1) {
        addEntity({ type: "spline", points: transient.splinePoints.slice() });
        transient.splinePoints = [];
        transient.drawing = false;
      }
    });

    renderAll();
    resizeCanvas();
    loadLocal();
  </script>
</body>
</html>
